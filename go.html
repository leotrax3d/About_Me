<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>redirect — leotrax3d</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=menu"
    />
    <link rel="stylesheet" href="styles.css" />
    <style>
      .go-wrap {
        min-height: calc(100svh - 80px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 6rem var(--gutter) 4rem;
      }

      .go-card {
        width: min(560px, 100%);
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 2rem;
      }

      .go-eyebrow {
        font-size: 10px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 1.5rem;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .go-eyebrow::before {
        content: "";
        display: inline-block;
        width: 20px;
        height: 1px;
        background: var(--accent);
        flex-shrink: 0;
      }

      .go-eyebrow span {
        color: var(--accent);
      }

      /* pill badge next to eyebrow label */
      .go-badge {
        display: inline-block;
        background: rgba(197, 241, 62, 0.12);
        border: 1px solid rgba(197, 241, 62, 0.3);
        color: var(--accent);
        font-size: 8px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        padding: 2px 7px;
        border-radius: 999px;
      }

      .go-heading {
        font-family: var(--display);
        font-size: clamp(1.6rem, 4vw, 2.2rem);
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: -0.02em;
        line-height: 1.1;
        margin-bottom: 1.75rem;
      }

      .go-dest-label {
        font-size: 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 0.4rem;
      }

      .go-dest {
        background: var(--bg3);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 0.65rem 0.75rem;
        font-size: 11px;
        color: var(--text);
        word-break: break-all;
        margin-bottom: 1.75rem;
        line-height: 1.7;
      }

      .go-count-label {
        font-size: 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 0.5rem;
      }

      .go-count-num {
        font-family: var(--display);
        font-size: clamp(2.4rem, 7vw, 4rem);
        font-weight: 700;
        color: var(--accent);
        letter-spacing: -0.04em;
        line-height: 1;
        margin-bottom: 1rem;
        font-variant-numeric: tabular-nums;
      }

      .go-bar-wrap {
        height: 3px;
        background: var(--border);
        border-radius: 999px;
        margin-bottom: 1.75rem;
        overflow: hidden;
      }

      .go-bar-fill {
        height: 100%;
        background: var(--accent);
        border-radius: 999px;
        width: 0%;
      }

      .go-actions {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
      }

      .go-note {
        margin-top: 1.5rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--border);
        font-size: 10px;
        color: var(--muted);
        line-height: 1.9;
      }

      .go-note a {
        color: var(--accent);
        text-decoration: none;
      }

      .go-note a:hover {
        text-decoration: underline;
      }

      .go-warning {
        display: flex;
        align-items: flex-start;
        gap: 0.6rem;
        background: rgba(197, 241, 62, 0.05);
        border: 1px solid rgba(197, 241, 62, 0.2);
        border-radius: 8px;
        padding: 0.75rem;
        margin-bottom: 1.5rem;
        font-size: 11px;
        color: var(--muted);
        line-height: 1.7;
      }

      .go-warning::before {
        content: "!";
        color: var(--accent);
        font-weight: 700;
        font-size: 12px;
        flex-shrink: 0;
        margin-top: 1px;
      }

      /* Inspect mode */
      .go-inspect-notice {
        background: rgba(197, 241, 62, 0.06);
        border: 1px solid rgba(197, 241, 62, 0.18);
        border-radius: 8px;
        padding: 0.7rem 0.85rem;
        font-size: 11px;
        color: var(--muted);
        line-height: 1.7;
        margin-bottom: 1.5rem;
      }

      .go-inspect-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
        margin-bottom: 1.75rem;
      }

      .go-inspect-val {
        font-size: 12px;
        color: var(--text);
        margin-top: 0.3rem;
      }

      .go-inspect-val.accent {
        color: var(--accent);
      }
    </style>
  </head>
  <body class="page-redirect custom-cursor">
    <!-- Shared chrome injected by site.js -->

    <div class="go-wrap">
      <div class="go-card" id="go-card">
        <!-- content injected by JS based on URL hash -->
        <div class="go-eyebrow"><span>loading</span></div>
        <div class="go-heading">One moment...</div>
      </div>
    </div>

    <footer>
      <a href="index.html">← leotrax3d</a>
      <a href="tools/urlhider.html">create a link</a>
    </footer>

    <script>
      (function () {
        var card = document.getElementById("go-card");
        var isInspect = window.location.search.indexOf("inspect") !== -1;

        function esc(s) {
          return s
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
        }

        function decodePayload(str) {
          try {
            var json = decodeURIComponent(atob(str));
            var data = JSON.parse(json);
            if (typeof data.u !== "string" || !data.u) throw new Error("no url");
            return data;
          } catch (e) {
            return null;
          }
        }

        function sanitizeUrl(url) {
          if (/^https?:\/\//i.test(url)) return url;
          if (/^\/\//i.test(url)) return "https:" + url;
          return null;
        }

        function showError(title, body) {
          card.innerHTML =
            '<div class="go-eyebrow"><span>error</span></div>' +
            '<div class="go-heading">' + esc(title) + "</div>" +
            '<p style="color:var(--muted);font-size:12px;line-height:1.9;margin-bottom:1.5rem">' + body + "</p>" +
            '<div class="go-actions">' +
            '<a href="tools/urlhider.html" class="btn btn-fill">create a link</a>' +
            '<a href="index.html" class="btn btn-ghost">← home</a>' +
            "</div>";
        }

        var hash = location.hash.slice(1);

        if (!hash) {
          showError(
            "No destination",
            "This link has no destination encoded. Try opening a generated link, or create one below."
          );
          return;
        }

        var data = decodePayload(hash);
        if (!data) {
          showError(
            "Invalid link",
            "This redirect link is malformed or has been corrupted. Please contact whoever sent it to you."
          );
          return;
        }

        var targetUrl = sanitizeUrl(data.u);
        if (!targetUrl) {
          showError(
            "Unsafe destination",
            "The destination URL does not use http or https and cannot be opened."
          );
          return;
        }

        var delay = Math.max(0, Math.min(300, parseInt(data.d, 10) || 0));
        var isConfirm = !!data.c;
        var done = false;

        var NOTE =
          '<div class="go-note">' +
          'Link created with <a href="tools/urlhider.html">URL Hider</a> on leotrax3d.github.io. ' +
          "The operator is not responsible for destination content." +
          "</div>";

        var WARNING =
          '<div class="go-warning">' +
          "You are about to leave leotrax3d.github.io. " +
          "Only proceed if you trust the source of this link." +
          "</div>";

        function goNow() {
          if (done) return;
          done = true;
          window.location.replace(targetUrl);
        }

        /* ============================================================
           INSPECT MODE — show link details without redirecting.
           Activated by ?inspect in the URL query string.
        ============================================================ */
        if (isInspect) {
          if (isInspect) document.title = "inspect — " + document.title;

          var delayLabel = delay === 0
            ? "immediately"
            : delay + " second" + (delay !== 1 ? "s" : "");
          var modeLabel = isConfirm ? "confirm (button)" : "auto";
          var redirectHref = location.pathname + location.hash;

          card.innerHTML =
            '<div class="go-eyebrow"><span>inspect</span> <span class="go-badge">no redirect</span></div>' +
            '<div class="go-heading">Link<br>Inspector</div>' +
            '<div class="go-inspect-notice">' +
            "Inspect mode is active — this link will <strong>not</strong> redirect you. " +
            "Review where it leads before deciding to open it." +
            "</div>" +
            '<div class="go-dest-label">destination</div>' +
            '<div class="go-dest">' + esc(targetUrl) + "</div>" +
            '<div class="go-inspect-grid">' +
            "<div>" +
            '<div class="go-dest-label">redirect delay</div>' +
            '<div class="go-inspect-val">' + delayLabel + "</div>" +
            "</div>" +
            "<div>" +
            '<div class="go-dest-label">mode</div>' +
            '<div class="go-inspect-val' + (isConfirm ? "" : " accent") + '">' + modeLabel + "</div>" +
            "</div>" +
            "</div>" +
            '<div class="go-actions">' +
            '<a href="' + esc(targetUrl) + '" class="btn btn-fill" target="_blank" rel="noopener noreferrer">open destination ↗</a>' +
            '<a href="' + esc(redirectHref) + '" class="btn btn-ghost">go to redirect</a>' +
            "</div>" +
            NOTE;

          /* Copy destination URL */
          var copyBtn = document.createElement("button");
          copyBtn.type = "button";
          copyBtn.className = "btn btn-ghost";
          copyBtn.textContent = "copy url";
          copyBtn.style.marginTop = "0.5rem";
          copyBtn.addEventListener("click", function () {
            var btn = this;
            (navigator.clipboard
              ? navigator.clipboard.writeText(targetUrl)
              : Promise.resolve()
            ).then(function () {
              btn.textContent = "copied!";
              setTimeout(function () { btn.textContent = "copy url"; }, 2000);
            });
          });
          card.querySelector(".go-actions").appendChild(copyBtn);
          return;
        }

        /* ============================================================
           CONFIRM MODE — no auto-redirect, user must click.
        ============================================================ */
        if (isConfirm) {
          card.innerHTML =
            '<div class="go-eyebrow"><span>redirect</span></div>' +
            '<div class="go-heading">Leaving<br>this site</div>' +
            '<div class="go-dest-label">destination</div>' +
            '<div class="go-dest">' + esc(targetUrl) + "</div>" +
            WARNING +
            '<div class="go-actions">' +
            '<button type="button" id="proceed-btn" class="btn btn-fill">proceed →</button>' +
            '<a href="index.html" class="btn btn-ghost">cancel</a>' +
            "</div>" +
            NOTE;

          document.getElementById("proceed-btn").addEventListener("click", goNow);
          return;
        }

        /* ============================================================
           AUTO MODE — countdown + automatic redirect.
        ============================================================ */
        if (delay === 0) {
          card.innerHTML =
            '<div class="go-eyebrow"><span>redirect</span></div>' +
            '<div class="go-heading">Redirecting...</div>' +
            '<div class="go-dest-label">destination</div>' +
            '<div class="go-dest">' + esc(targetUrl) + "</div>" +
            '<div class="go-actions">' +
            '<button type="button" id="go-now-btn" class="btn btn-fill">go now →</button>' +
            '<a href="index.html" class="btn btn-ghost">cancel</a>' +
            "</div>" +
            NOTE;

          document.getElementById("go-now-btn").addEventListener("click", goNow);
          setTimeout(goNow, 80);
          return;
        }

        /* Auto mode with countdown */
        var remaining = delay;

        card.innerHTML =
          '<div class="go-eyebrow"><span>redirect</span></div>' +
          '<div class="go-heading">Redirecting...</div>' +
          '<div class="go-dest-label">destination</div>' +
          '<div class="go-dest">' + esc(targetUrl) + "</div>" +
          '<div class="go-count-label">redirecting in</div>' +
          '<div class="go-count-num" id="count-num">' + remaining + "</div>" +
          '<div class="go-bar-wrap"><div class="go-bar-fill" id="bar-fill"></div></div>' +
          '<div class="go-actions">' +
          '<button type="button" id="go-now-btn" class="btn btn-fill">go now →</button>' +
          '<a href="index.html" class="btn btn-ghost">cancel</a>' +
          "</div>" +
          NOTE;

        document.getElementById("go-now-btn").addEventListener("click", goNow);

        var numEl = document.getElementById("count-num");
        var barEl = document.getElementById("bar-fill");

        /* Kick the CSS bar animation on the next frame pair so the
           transition actually fires (setting width before paint = no anim). */
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            if (barEl) {
              barEl.style.transition = "width " + delay + "s linear";
              barEl.style.width = "100%";
            }
          });
        });

        setTimeout(goNow, delay * 1000);

        var tickTimer = setInterval(function () {
          if (done) { clearInterval(tickTimer); return; }
          remaining--;
          if (numEl) numEl.textContent = Math.max(0, remaining);
          if (remaining <= 0) clearInterval(tickTimer);
        }, 1000);
      })();
    </script>

    <script src="site.js"></script>
  </body>
</html>
