<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>gute besserung HOHOHO - leotrax3d</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="fonts.css" />
  </head>
  <body class="page-gute custom-cursor">
    <!-- Shared chrome (background field, cursor, terminal, nav) is
         injected by site.js. -->

    <div class="page-header">
      <div class="wrap">
        <div class="page-eyebrow">
          leotrax3d &nbsp;·&nbsp; <span>gute besserung</span>
        </div>
        <h1>
          Gute<br />
          <span class="dim">Besserung</span>
        </h1>
        <p class="page-sub">
Gute Besserung wünscht ihnen ihre IMP Klasse      </p>
      </div>
    </div>

    <section id="message">
      <div class="wrap">
        <div class="sec fade">
          <div class="sec-head">
            <span class="sec-num">01</span>
            <h2>message</h2>
          </div>
          <div class="about-grid">
            <div class="body-text">
              <p>
                Wir hoffen dass es ihnen bald besser geht und sie schnell wieder gesund werden!
              </p>
            </div>
          </div>
        </div>
      </div>
    </section>

    <div class="name-overlay" id="name-overlay" aria-hidden="true">
      <div class="name-overlay-text" id="name-overlay-text"></div>
    </div>

    <footer>
      <a href="index.html"><- back to leotrax3d</a>
      <a href="https://github.com/leotrax3d" target="_blank"
        >github.com/leotrax3d</a
      >
    </footer>

    <script>
      // Page-specific behaviour; shared chrome lives in site.js.
      const showNameButton = document.querySelector("#show-name");
      const nameOverlay = document.querySelector("#name-overlay");
      const nameOverlayText = document.querySelector("#name-overlay-text");

      window.terminalCommands = {
        message(args, t) {
          t.print("jumping to message...");
          t.close();
          document
            .querySelector("#message")
            ?.scrollIntoView({ behavior: "smooth" });
        },
      };

      if (showNameButton && nameOverlay) {
        showNameButton.addEventListener("click", () => {
          const nameText = "Harald ritz";
          nameOverlayText.textContent = nameText;
          nameOverlay.classList.add("is-open");
          nameOverlay.setAttribute("aria-hidden", "false");
          if ("speechSynthesis" in window) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(nameText);
            utterance.lang = "de-DE";
            window.speechSynthesis.speak(utterance);
          }
        });

        nameOverlay.addEventListener("click", () => {
          nameOverlay.classList.remove("is-open");
          nameOverlay.setAttribute("aria-hidden", "true");
        });
      }
    </script>
    <script src="site.js"></script>
  </body>
</html>
