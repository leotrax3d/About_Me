<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>color converter — leotrax3d</title>
    <meta name="description" content="convert colors between hex, rgb, hsl and css formats with a live preview, entirely in your browser." />
    <meta name="author" content="leotrax3d" />
    <link rel="canonical" href="https://leotrax3d.github.io/About_Me/tools/color.html" />
    <link rel="icon" href="../favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=menu"
    />
    <link rel="stylesheet" href="../styles.css" />
    <style>
      .clr-preview {
        width: 100%;
        height: 80px;
        border-radius: 8px;
        border: 1px solid var(--border);
        transition: background 0.2s;
        background: #c5f13e;
        margin-bottom: 1rem;
      }
      .clr-swatch-row { display: flex; gap: 0.5rem; margin-bottom: 1.2rem; flex-wrap: wrap; }
      .clr-swatch { width: 28px; height: 28px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: transform 0.15s, border-color 0.15s; flex-shrink: 0; }
      .clr-swatch:hover, .clr-swatch.is-active { transform: scale(1.2); border-color: var(--accent); }
      .clr-row { display: flex; gap: 0.5rem; align-items: center; }
      .clr-row .qr-input { flex: 1; }
      .clr-copy-btn { padding: 8px 14px; font-size: 10px; white-space: nowrap; }
      .clr-output-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
      .clr-out-item { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 0.75rem; display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; }
      .clr-out-label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); flex-shrink: 0; }
      .clr-out-val { font-size: 12px; color: var(--text); word-break: break-all; }
      .clr-error { color: #ff6b6b; font-size: 11px; margin-top: 0.4rem; min-height: 1rem; }
      .clr-picker-row { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.5rem; }
      .clr-picker-row input[type=color] { width: 48px; height: 38px; padding: 2px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg3); cursor: pointer; flex-shrink: 0; }
      @media (max-width: 500px) { .clr-output-grid { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body class="page-color custom-cursor">
    <!-- Shared chrome injected by site.js -->

    <div class="page-header">
      <div class="wrap">
        <div class="page-eyebrow">
          leotrax3d &nbsp;·&nbsp; <span>color converter</span>
        </div>
        <h1>Color<br /><span class="dim">Converter</span></h1>
        <p class="page-sub">
          convert colors between hex, rgb, hsl and css named formats with a
          live preview and one-click copy for any format.
        </p>
      </div>
    </div>

    <section id="converter">
      <div class="wrap">
        <div class="sec fade">
          <div class="sec-head">
            <span class="sec-num">01</span>
            <h2>convert</h2>
          </div>

          <div class="qr-panel" style="max-width: 560px">
            <div class="clr-preview" id="clr-preview"></div>

            <div class="clr-swatch-row" id="clr-swatches">
              <!-- filled by JS -->
            </div>

            <form class="qr-form" action="#" autocomplete="off">
              <div class="qr-field">
                <label>input (hex, rgb, hsl or any css color)</label>
                <div class="clr-picker-row">
                  <input type="color" id="clr-picker" value="#c5f13e" />
                  <input type="text" id="clr-input" class="qr-input" value="#c5f13e" placeholder="#c5f13e or rgb(255,0,0)" spellcheck="false" style="flex:1" />
                </div>
                <div class="clr-error" id="clr-error"></div>
              </div>
            </form>

            <div style="margin-top:1.2rem">
              <span class="tool-hash-label">formats</span>
              <div class="clr-output-grid" id="clr-output-grid">
                <div class="clr-out-item">
                  <div>
                    <div class="clr-out-label">hex</div>
                    <div class="clr-out-val" id="clr-out-hex">—</div>
                  </div>
                  <button type="button" class="btn btn-ghost clr-copy-btn" data-target="clr-out-hex">copy</button>
                </div>
                <div class="clr-out-item">
                  <div>
                    <div class="clr-out-label">rgb</div>
                    <div class="clr-out-val" id="clr-out-rgb">—</div>
                  </div>
                  <button type="button" class="btn btn-ghost clr-copy-btn" data-target="clr-out-rgb">copy</button>
                </div>
                <div class="clr-out-item">
                  <div>
                    <div class="clr-out-label">hsl</div>
                    <div class="clr-out-val" id="clr-out-hsl">—</div>
                  </div>
                  <button type="button" class="btn btn-ghost clr-copy-btn" data-target="clr-out-hsl">copy</button>
                </div>
                <div class="clr-out-item">
                  <div>
                    <div class="clr-out-label">css rgb()</div>
                    <div class="clr-out-val" id="clr-out-cssrgb">—</div>
                  </div>
                  <button type="button" class="btn btn-ghost clr-copy-btn" data-target="clr-out-cssrgb">copy</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <footer>
      <a href="../tools.html">← tools</a>
      <a href="../index.html">leotrax3d</a>
    </footer>

    <script>
      (function () {
        var inputEl = document.getElementById("clr-input");
        var pickerEl = document.getElementById("clr-picker");
        var previewEl = document.getElementById("clr-preview");
        var errorEl = document.getElementById("clr-error");

        var SWATCHES = ["#c5f13e","#ff6b6b","#79b8ff","#ffab70","#f97583","#b392f0","#85e89d","#0d0e0f","#ffffff","#888888"];

        var swatchRow = document.getElementById("clr-swatches");
        SWATCHES.forEach(function (hex) {
          var btn = document.createElement("button");
          btn.type = "button";
          btn.className = "clr-swatch";
          btn.style.background = hex;
          btn.title = hex;
          btn.addEventListener("click", function () {
            document.querySelectorAll(".clr-swatch").forEach(function (b) { b.classList.remove("is-active"); });
            btn.classList.add("is-active");
            inputEl.value = hex;
            pickerEl.value = hex;
            convert(hex);
          });
          swatchRow.appendChild(btn);
        });

        function parseColor(str) {
          /* Use a hidden canvas context to parse any valid CSS color */
          var canvas = document.createElement("canvas");
          canvas.width = canvas.height = 1;
          var ctx = canvas.getContext("2d");
          ctx.fillStyle = "#000";
          ctx.fillStyle = str;
          var computed = ctx.fillStyle;
          /* fillStyle returns hex or rgb(...) */
          if (/^#/.test(computed)) {
            var r = parseInt(computed.slice(1,3),16), g = parseInt(computed.slice(3,5),16), b = parseInt(computed.slice(5,7),16);
            return { r: r, g: g, b: b };
          }
          var m = computed.match(/rgb\((\d+),\s*(\d+),\s*(\d+)\)/);
          if (m) return { r: parseInt(m[1]), g: parseInt(m[2]), b: parseInt(m[3]) };
          return null;
        }

        function rgbToHsl(r, g, b) {
          r /= 255; g /= 255; b /= 255;
          var max = Math.max(r,g,b), min = Math.min(r,g,b);
          var h, s, l = (max + min) / 2;
          if (max === min) { h = s = 0; }
          else {
            var d = max - min;
            s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
            switch (max) {
              case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
              case g: h = ((b - r) / d + 2) / 6; break;
              default: h = ((r - g) / d + 4) / 6;
            }
          }
          return { h: Math.round(h*360), s: Math.round(s*100), l: Math.round(l*100) };
        }

        function toHex(n) { return n.toString(16).padStart(2,"0"); }

        function convert(val) {
          errorEl.textContent = "";
          val = (val || inputEl.value).trim();
          if (!val) { clearOutputs(); return; }

          var rgb = parseColor(val);
          if (!rgb) {
            /* Check if canvas just returned black for an invalid input */
            var test = parseColor("invalid-sentinel-zzz");
            errorEl.textContent = "could not parse color";
            clearOutputs(); return;
          }

          /* Extra check: if input isn't "black" but we got black, it might be invalid */
          if (rgb.r === 0 && rgb.g === 0 && rgb.b === 0 && !/^(#0{3,6}|rgb\(0|black|transparent)/.test(val.toLowerCase())) {
            errorEl.textContent = "could not parse color";
            clearOutputs(); return;
          }

          var hex = "#" + toHex(rgb.r) + toHex(rgb.g) + toHex(rgb.b);
          var hsl = rgbToHsl(rgb.r, rgb.g, rgb.b);

          document.getElementById("clr-out-hex").textContent = hex;
          document.getElementById("clr-out-rgb").textContent = rgb.r + ", " + rgb.g + ", " + rgb.b;
          document.getElementById("clr-out-hsl").textContent = hsl.h + "°, " + hsl.s + "%, " + hsl.l + "%";
          document.getElementById("clr-out-cssrgb").textContent = "rgb(" + rgb.r + ", " + rgb.g + ", " + rgb.b + ")";

          previewEl.style.background = hex;
          try { pickerEl.value = hex; } catch (e) {}

          /* reflect the colour in the URL hash so it can be shared */
          history.replaceState(null, "", location.pathname + location.search + "#" + hex.slice(1));
        }

        function clearOutputs() {
          ["clr-out-hex","clr-out-rgb","clr-out-hsl","clr-out-cssrgb"].forEach(function (id) { document.getElementById(id).textContent = "—"; });
          previewEl.style.background = "var(--bg3)";
        }

        document.querySelectorAll(".clr-copy-btn").forEach(function (btn) {
          btn.addEventListener("click", function () {
            var val = document.getElementById(btn.dataset.target).textContent;
            if (val === "—") return;
            var orig = btn.textContent;
            if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(val).then(function () { btn.textContent = "copied!"; setTimeout(function () { btn.textContent = orig; }, 2000); });
          });
        });

        inputEl.addEventListener("input", function () { convert(inputEl.value); });
        pickerEl.addEventListener("input", function () { inputEl.value = pickerEl.value; convert(pickerEl.value); });

        /* restore a shared colour from the URL hash (#rrggbb), else default */
        var initial = "#c5f13e";
        var fromHash = location.hash.slice(1);
        if (/^[0-9a-fA-F]{3}([0-9a-fA-F]{3})?$/.test(fromHash)) {
          initial = "#" + fromHash;
          inputEl.value = initial;
        }
        convert(initial);
      })();
    </script>
    <script src="../site.js"></script>
  </body>
</html>
