<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dice roller — leotrax3d</title>
    <meta name="description" content="roll any number of dice (d4–d100) and see each result plus the total. client-side, crypto-random." />
    <meta name="author" content="leotrax3d" />
    <link rel="canonical" href="https://leotrax3d.github.io/About_Me/tools/dice.html" />
    <link rel="icon" href="../favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="../fonts.css" />
    <style>
      .dice-faces { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem; }
      .dice-face {
        width: 52px; height: 52px; border-radius: 10px; border: 1px solid var(--border2);
        background: var(--bg3); display: flex; align-items: center; justify-content: center;
        font-size: 18px; font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums;
      }
      .dice-sum { font-size: clamp(2rem, 8vw, 3.5rem); font-weight: 700; color: var(--accent); line-height: 1; font-variant-numeric: tabular-nums; }
      .dice-sum-label { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.4rem; }
      .dice-result.is-empty { color: var(--muted); font-size: 12px; }
    </style>
  </head>
  <body class="page-dice custom-cursor">
    <div class="page-header">
      <div class="wrap">
        <div class="page-eyebrow">leotrax3d &nbsp;·&nbsp; <span>dice roller</span></div>
        <h1>Dice<br /><span class="dim">Roller</span></h1>
        <p class="page-sub">
          roll polyhedral dice — pick how many and how many sides, then see
          every face and the total. uses the Web Crypto API for fair rolls.
        </p>
      </div>
    </div>

    <section id="roller">
      <div class="wrap">
        <div class="sec fade">
          <div class="sec-head"><span class="sec-num">01</span><h2>roll</h2></div>

          <div class="qr-panel" style="max-width: 560px">
            <form class="qr-form" action="#" autocomplete="off">
              <div class="qr-row">
                <div class="qr-field">
                  <label for="dice-count">number of dice</label>
                  <input type="number" id="dice-count" class="qr-input" value="2" min="1" max="100" />
                </div>
                <div class="qr-field">
                  <label for="dice-sides">sides</label>
                  <select id="dice-sides" class="qr-select">
                    <option value="4">d4</option>
                    <option value="6" selected>d6</option>
                    <option value="8">d8</option>
                    <option value="10">d10</option>
                    <option value="12">d12</option>
                    <option value="20">d20</option>
                    <option value="100">d100</option>
                  </select>
                </div>
              </div>
              <div class="qr-field">
                <label for="dice-mod">modifier (added to total)</label>
                <input type="number" id="dice-mod" class="qr-input" value="0" />
              </div>
              <button type="button" id="dice-go" class="btn btn-fill">roll</button>
            </form>
          </div>

          <div class="qr-panel" style="max-width: 560px; margin-top: 1.5rem">
            <span class="tool-hash-label">rolls</span>
            <div class="dice-result is-empty" id="dice-result">press roll.</div>
          </div>
        </div>
      </div>
    </section>

    <footer>
      <a href="../tools.html">← tools</a>
      <a href="../index.html">leotrax3d</a>
    </footer>

    <script>
      (function () {
        var countEl = document.getElementById("dice-count");
        var sidesEl = document.getElementById("dice-sides");
        var modEl = document.getElementById("dice-mod");
        var resultEl = document.getElementById("dice-result");

        function rollOne(sides) {
          var u = new Uint32Array(1);
          crypto.getRandomValues(u);
          return 1 + Math.floor((u[0] / 4294967296) * sides);
        }

        function roll() {
          var count = Math.max(1, Math.min(100, parseInt(countEl.value, 10) || 1));
          var sides = parseInt(sidesEl.value, 10);
          var mod = parseInt(modEl.value, 10) || 0;
          var rolls = [];
          for (var i = 0; i < count; i++) rolls.push(rollOne(sides));
          var sum = rolls.reduce(function (a, b) { return a + b; }, 0) + mod;

          var facesHtml = '<div class="dice-faces">' +
            rolls.map(function (r) { return '<div class="dice-face">' + r + "</div>"; }).join("") +
            "</div>";
          var modLabel = mod ? "  ·  " + count + "d" + sides + (mod > 0 ? " + " + mod : " − " + Math.abs(mod)) : "  ·  " + count + "d" + sides;
          resultEl.classList.remove("is-empty");
          resultEl.innerHTML = facesHtml +
            '<div class="dice-sum-label">total' + modLabel + '</div>' +
            '<div class="dice-sum">' + sum + "</div>";
        }

        document.getElementById("dice-go").addEventListener("click", roll);
      })();
    </script>
    <script src="../site.js"></script>
  </body>
</html>
