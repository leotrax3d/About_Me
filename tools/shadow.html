<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>box shadow generator — leotrax3d</title>
    <meta name="description" content="build a CSS box-shadow with live preview and copy the code — offset, blur, spread, colour, inset. client-side." />
    <meta name="author" content="leotrax3d" />
    <link rel="canonical" href="https://leotrax3d.github.io/About_Me/tools/shadow.html" />
    <link rel="icon" href="../favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="../fonts.css" />
    <style>
      .sh-stage { background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; height: 240px; display: flex; align-items: center; justify-content: center; margin-bottom: 1.5rem; }
      .sh-box { width: 120px; height: 120px; border-radius: 14px; background: var(--accent); }
      .sh-slider { margin-bottom: 0.9rem; }
      .sh-slider label { display: flex; justify-content: space-between; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.3rem; }
      .sh-slider label b { color: var(--accent); font-variant-numeric: tabular-nums; }
      .sh-slider input[type=range] { width: 100%; accent-color: var(--accent); }
      .sh-code { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 0.85rem 1rem; font-size: 12px; color: var(--accent); word-break: break-all; line-height: 1.7; }
      .sh-actions { display: flex; gap: 0.6rem; flex-wrap: wrap; margin-top: 0.75rem; }
      .sh-picker { display: flex; align-items: center; gap: 0.6rem; }
      .sh-picker input[type=color] { width: 42px; height: 36px; padding: 2px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg3); cursor: pointer; }
    </style>
  </head>
  <body class="page-shadow custom-cursor">
    <div class="page-header">
      <div class="wrap">
        <div class="page-eyebrow">leotrax3d &nbsp;·&nbsp; <span>box shadow generator</span></div>
        <h1>Shadow<br /><span class="dim">Generator</span></h1>
        <p class="page-sub">
          dial in a CSS <code>box-shadow</code> — offset, blur, spread, colour
          and opacity — watch it live on the box and copy the rule.
        </p>
      </div>
    </div>

    <section id="generator">
      <div class="wrap">
        <div class="sec fade">
          <div class="sec-head"><span class="sec-num">01</span><h2>build</h2></div>

          <div class="qr-panel" style="max-width: 600px">
            <div class="sh-stage"><div class="sh-box" id="sh-box"></div></div>

            <div class="sh-slider"><label>offset X <b id="sh-x-v">0px</b></label><input type="range" id="sh-x" min="-100" max="100" value="0" /></div>
            <div class="sh-slider"><label>offset Y <b id="sh-y-v">12px</b></label><input type="range" id="sh-y" min="-100" max="100" value="12" /></div>
            <div class="sh-slider"><label>blur <b id="sh-blur-v">30px</b></label><input type="range" id="sh-blur" min="0" max="200" value="30" /></div>
            <div class="sh-slider"><label>spread <b id="sh-spread-v">0px</b></label><input type="range" id="sh-spread" min="-100" max="100" value="0" /></div>
            <div class="sh-slider"><label>opacity <b id="sh-op-v">35%</b></label><input type="range" id="sh-op" min="0" max="100" value="35" /></div>

            <div class="qr-row" style="margin-top:0.5rem">
              <div class="qr-field">
                <label>shadow colour</label>
                <div class="sh-picker">
                  <input type="color" id="sh-color" value="#000000" />
                  <span style="font-size:11px;color:var(--muted)">+ opacity slider</span>
                </div>
              </div>
              <div class="qr-field">
                <label>inset</label>
                <label class="qr-check" style="margin-top:0.5rem"><input type="checkbox" id="sh-inset" /> inner shadow</label>
              </div>
            </div>

            <span class="tool-hash-label" style="margin-top:1rem">css</span>
            <div class="sh-code" id="sh-code"></div>
            <div class="sh-actions">
              <button type="button" id="sh-copy" class="btn btn-fill">copy css</button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <footer>
      <a href="../tools.html">← tools</a>
      <a href="../index.html">leotrax3d</a>
    </footer>

    <script>
      (function () {
        var ids = ["x", "y", "blur", "spread", "op"];
        var box = document.getElementById("sh-box");
        var codeEl = document.getElementById("sh-code");
        var colorEl = document.getElementById("sh-color");
        var insetEl = document.getElementById("sh-inset");

        function hexToRgb(h) { h = h.replace("#", ""); return { r: parseInt(h.slice(0, 2), 16), g: parseInt(h.slice(2, 4), 16), b: parseInt(h.slice(4, 6), 16) }; }

        function update() {
          var x = +document.getElementById("sh-x").value;
          var y = +document.getElementById("sh-y").value;
          var blur = +document.getElementById("sh-blur").value;
          var spread = +document.getElementById("sh-spread").value;
          var op = +document.getElementById("sh-op").value;
          document.getElementById("sh-x-v").textContent = x + "px";
          document.getElementById("sh-y-v").textContent = y + "px";
          document.getElementById("sh-blur-v").textContent = blur + "px";
          document.getElementById("sh-spread-v").textContent = spread + "px";
          document.getElementById("sh-op-v").textContent = op + "%";

          var c = hexToRgb(colorEl.value);
          var rgba = "rgba(" + c.r + ", " + c.g + ", " + c.b + ", " + (op / 100) + ")";
          var inset = insetEl.checked ? "inset " : "";
          var shadow = inset + x + "px " + y + "px " + blur + "px " + spread + "px " + rgba;
          box.style.boxShadow = shadow;
          codeEl.textContent = "box-shadow: " + shadow + ";";
        }

        ids.forEach(function (id) { document.getElementById("sh-" + id).addEventListener("input", update); });
        colorEl.addEventListener("input", update);
        insetEl.addEventListener("change", update);
        document.getElementById("sh-copy").addEventListener("click", function () {
          var btn = this;
          var done = function () { btn.textContent = "copied!"; setTimeout(function () { btn.textContent = "copy css"; }, 2000); };
          if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(codeEl.textContent).then(done); else done();
        });
        update();
      })();
    </script>
    <script src="../site.js"></script>
  </body>
</html>
