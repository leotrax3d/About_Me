<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>list randomizer — leotrax3d</title>
    <meta name="description" content="shuffle a list into random order with a fair Fisher–Yates shuffle. client-side, crypto-random." />
    <meta name="author" content="leotrax3d" />
    <link rel="canonical" href="https://leotrax3d.github.io/About_Me/tools/shuffle.html" />
    <link rel="icon" href="../favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="../fonts.css" />
    <style>
      .shuf-list { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 0.85rem 1rem; min-height: 4rem; counter-reset: shuf; }
      .shuf-list.is-empty { color: var(--muted); font-size: 12px; }
      .shuf-item { counter-increment: shuf; font-size: 13px; color: var(--text); line-height: 2; }
      .shuf-item::before { content: counter(shuf) ". "; color: var(--accent); font-weight: 700; }
      .shuf-actions { display: flex; gap: 0.6rem; flex-wrap: wrap; margin-top: 0.75rem; }
    </style>
  </head>
  <body class="page-shuffle custom-cursor">
    <div class="page-header">
      <div class="wrap">
        <div class="page-eyebrow">leotrax3d &nbsp;·&nbsp; <span>list randomizer</span></div>
        <h1>List<br /><span class="dim">Randomizer</span></h1>
        <p class="page-sub">
          paste a list — one item per line — and shuffle it into a random
          order with a fair Fisher–Yates shuffle. nothing leaves your browser.
        </p>
      </div>
    </div>

    <section id="randomizer">
      <div class="wrap">
        <div class="sec fade">
          <div class="sec-head"><span class="sec-num">01</span><h2>shuffle</h2></div>

          <div class="qr-panel" style="max-width: 600px">
            <form class="qr-form" action="#" autocomplete="off">
              <div class="qr-field">
                <label for="shuf-input">your list (one item per line)</label>
                <textarea id="shuf-input" class="qr-textarea" rows="7" placeholder="Alice&#10;Bob&#10;Carol&#10;Dave" spellcheck="false"></textarea>
              </div>
              <button type="button" id="shuf-go" class="btn btn-fill">shuffle</button>
            </form>
          </div>

          <div class="qr-panel" style="max-width: 600px; margin-top: 1.5rem">
            <span class="tool-hash-label">shuffled</span>
            <div class="shuf-list is-empty" id="shuf-output">your shuffled list appears here.</div>
            <div class="shuf-actions">
              <button type="button" id="shuf-copy" class="btn btn-ghost" disabled>copy</button>
              <button type="button" id="shuf-again" class="btn btn-ghost" disabled>shuffle again</button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <footer>
      <a href="../tools.html">← tools</a>
      <a href="../index.html">leotrax3d</a>
    </footer>

    <script>
      (function () {
        var inputEl = document.getElementById("shuf-input");
        var outEl = document.getElementById("shuf-output");
        var copyBtn = document.getElementById("shuf-copy");
        var againBtn = document.getElementById("shuf-again");
        var current = [];

        function randInt(n) {
          var u = new Uint32Array(1);
          crypto.getRandomValues(u);
          return Math.floor((u[0] / 4294967296) * n);
        }

        function shuffle() {
          var items = inputEl.value.split("\n").map(function (s) { return s.trim(); }).filter(function (s) { return s.length; });
          if (!items.length) { outEl.textContent = "add at least one item above."; outEl.classList.add("is-empty"); copyBtn.disabled = true; againBtn.disabled = true; current = []; return; }
          /* Fisher–Yates */
          for (var i = items.length - 1; i > 0; i--) {
            var j = randInt(i + 1);
            var tmp = items[i]; items[i] = items[j]; items[j] = tmp;
          }
          current = items;
          outEl.classList.remove("is-empty");
          outEl.innerHTML = items.map(function (it) {
            return '<div class="shuf-item">' + it.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;") + "</div>";
          }).join("");
          copyBtn.disabled = false;
          againBtn.disabled = false;
        }

        copyBtn.addEventListener("click", function () {
          var done = function () { copyBtn.textContent = "copied!"; setTimeout(function () { copyBtn.textContent = "copy"; }, 2000); };
          if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(current.join("\n")).then(done); else done();
        });
        document.getElementById("shuf-go").addEventListener("click", shuffle);
        againBtn.addEventListener("click", shuffle);
      })();
    </script>
    <script src="../site.js"></script>
  </body>
</html>
