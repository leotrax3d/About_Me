<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>gradient generator — leotrax3d</title>
    <meta name="description" content="build CSS linear and radial gradients with multiple colour stops and copy the code. client-side." />
    <meta name="author" content="leotrax3d" />
    <link rel="canonical" href="https://leotrax3d.github.io/About_Me/tools/gradient.html" />
    <link rel="icon" href="../favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="../fonts.css" />
    <style>
      .grad-preview { height: 200px; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 1.5rem; }
      .grad-stop { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.6rem; }
      .grad-stop input[type=color] { width: 42px; height: 36px; padding: 2px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg3); cursor: pointer; flex-shrink: 0; }
      .grad-stop input[type=range] { flex: 1; accent-color: var(--accent); }
      .grad-stop .pos { font-size: 11px; color: var(--muted); width: 3rem; text-align: right; font-variant-numeric: tabular-nums; }
      .grad-stop .rm { background: none; border: 1px solid var(--border2); color: var(--muted); border-radius: 6px; width: 30px; height: 30px; cursor: pointer; flex-shrink: 0; }
      .grad-stop .rm:hover { color: #ff6b6b; border-color: #ff6b6b; }
      .grad-code { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 0.85rem 1rem; font-size: 12px; color: var(--accent); word-break: break-all; line-height: 1.7; }
      .grad-actions { display: flex; gap: 0.6rem; flex-wrap: wrap; margin-top: 0.75rem; }
      .grad-angle-row { display: flex; align-items: center; gap: 0.75rem; }
      .grad-angle-row input[type=range] { flex: 1; accent-color: var(--accent); }
    </style>
  </head>
  <body class="page-gradient custom-cursor">
    <div class="page-header">
      <div class="wrap">
        <div class="page-eyebrow">leotrax3d &nbsp;·&nbsp; <span>gradient generator</span></div>
        <h1>Gradient<br /><span class="dim">Generator</span></h1>
        <p class="page-sub">
          build a CSS gradient — linear or radial, with as many colour stops
          as you like — preview it live and copy the <code>background</code> rule.
        </p>
      </div>
    </div>

    <section id="generator">
      <div class="wrap">
        <div class="sec fade">
          <div class="sec-head"><span class="sec-num">01</span><h2>build</h2></div>

          <div class="qr-panel" style="max-width: 600px">
            <div class="grad-preview" id="grad-preview"></div>

            <form class="qr-form" action="#" autocomplete="off">
              <div class="qr-row">
                <div class="qr-field">
                  <label>type</label>
                  <div class="qr-toggle" id="grad-type" role="group">
                    <button type="button" class="btn btn-ghost is-active" data-type="linear">linear</button>
                    <button type="button" class="btn btn-ghost" data-type="radial">radial</button>
                  </div>
                </div>
                <div class="qr-field" id="grad-angle-field">
                  <label for="grad-angle">angle <span id="grad-angle-val" style="color:var(--accent)">90°</span></label>
                  <div class="grad-angle-row">
                    <input type="range" id="grad-angle" min="0" max="360" value="90" />
                  </div>
                </div>
              </div>

              <div class="qr-field">
                <label>colour stops</label>
                <div id="grad-stops"></div>
                <button type="button" id="grad-add" class="btn btn-ghost" style="margin-top:0.4rem">+ add stop</button>
              </div>
            </form>

            <span class="tool-hash-label" style="margin-top:1rem">css</span>
            <div class="grad-code" id="grad-code"></div>
            <div class="grad-actions">
              <button type="button" id="grad-copy" class="btn btn-fill">copy css</button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <footer>
      <a href="../tools.html">← tools</a>
      <a href="../index.html">leotrax3d</a>
    </footer>

    <script>
      (function () {
        var stops = [{ color: "#c5f13e", pos: 0 }, { color: "#0d0e0f", pos: 100 }];
        var type = "linear";
        var angle = 90;

        var stopsEl = document.getElementById("grad-stops");
        var previewEl = document.getElementById("grad-preview");
        var codeEl = document.getElementById("grad-code");
        var angleField = document.getElementById("grad-angle-field");
        var angleEl = document.getElementById("grad-angle");
        var angleVal = document.getElementById("grad-angle-val");

        function gradientCss() {
          var sorted = stops.slice().sort(function (a, b) { return a.pos - b.pos; });
          var list = sorted.map(function (s) { return s.color + " " + s.pos + "%"; }).join(", ");
          return type === "linear" ? "linear-gradient(" + angle + "deg, " + list + ")" : "radial-gradient(circle, " + list + ")";
        }

        function renderStops() {
          stopsEl.innerHTML = "";
          stops.forEach(function (s, i) {
            var row = document.createElement("div");
            row.className = "grad-stop";
            row.innerHTML =
              '<input type="color" value="' + s.color + '" data-i="' + i + '" class="gc" />' +
              '<input type="range" min="0" max="100" value="' + s.pos + '" data-i="' + i + '" class="gp" />' +
              '<span class="pos">' + s.pos + "%</span>" +
              (stops.length > 2 ? '<button type="button" class="rm" data-i="' + i + '">×</button>' : '<span style="width:30px"></span>');
            stopsEl.appendChild(row);
          });
          stopsEl.querySelectorAll(".gc").forEach(function (el) { el.addEventListener("input", function () { stops[+el.dataset.i].color = el.value; update(); }); });
          stopsEl.querySelectorAll(".gp").forEach(function (el) { el.addEventListener("input", function () { stops[+el.dataset.i].pos = +el.value; el.parentNode.querySelector(".pos").textContent = el.value + "%"; updateOutput(); }); });
          stopsEl.querySelectorAll(".rm").forEach(function (el) { el.addEventListener("click", function () { stops.splice(+el.dataset.i, 1); update(); }); });
        }

        function updateOutput() {
          var css = gradientCss();
          previewEl.style.background = css;
          codeEl.textContent = "background: " + css + ";";
        }

        function update() { renderStops(); updateOutput(); }

        document.querySelectorAll("#grad-type .btn").forEach(function (btn) {
          btn.addEventListener("click", function () {
            document.querySelectorAll("#grad-type .btn").forEach(function (b) { b.classList.remove("is-active"); });
            this.classList.add("is-active");
            type = this.dataset.type;
            angleField.style.visibility = type === "linear" ? "visible" : "hidden";
            updateOutput();
          });
        });

        angleEl.addEventListener("input", function () { angle = +angleEl.value; angleVal.textContent = angle + "°"; updateOutput(); });
        document.getElementById("grad-add").addEventListener("click", function () { stops.push({ color: "#888888", pos: 50 }); update(); });
        document.getElementById("grad-copy").addEventListener("click", function () {
          var btn = this;
          var done = function () { btn.textContent = "copied!"; setTimeout(function () { btn.textContent = "copy css"; }, 2000); };
          if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(codeEl.textContent).then(done); else done();
        });

        update();
      })();
    </script>
    <script src="../site.js"></script>
  </body>
</html>
