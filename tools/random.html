<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>random number — leotrax3d</title>
    <meta name="description" content="generate cryptographically random numbers in a range, with count, decimals and unique options. client-side." />
    <meta name="author" content="leotrax3d" />
    <link rel="canonical" href="https://leotrax3d.github.io/About_Me/tools/random.html" />
    <link rel="icon" href="../favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=menu"
    />
    <link rel="stylesheet" href="../styles.css" />
    <style>
      .rnd-result {
        background: var(--bg3); border: 1px solid var(--border); border-radius: 8px;
        padding: 1rem; min-height: 4rem; font-size: 14px; color: var(--accent);
        line-height: 2; word-break: break-word; letter-spacing: 0.04em;
      }
      .rnd-result.is-empty { color: var(--muted); font-size: 12px; letter-spacing: 0; }
      .rnd-big { font-size: clamp(2.4rem, 9vw, 4.5rem); font-weight: 700; line-height: 1; color: var(--accent); font-variant-numeric: tabular-nums; }
      .rnd-actions { display: flex; gap: 0.6rem; flex-wrap: wrap; margin-top: 0.75rem; }
      .rnd-error { color: #ff6b6b; font-size: 11px; min-height: 1rem; margin-top: 0.4rem; }
    </style>
  </head>
  <body class="page-random custom-cursor">
    <div class="page-header">
      <div class="wrap">
        <div class="page-eyebrow">leotrax3d &nbsp;·&nbsp; <span>random number</span></div>
        <h1>Random<br /><span class="dim">Number</span></h1>
        <p class="page-sub">
          generate random numbers in any range using the Web Crypto API —
          choose how many, how many decimals, and whether they must be unique.
        </p>
      </div>
    </div>

    <section id="generator">
      <div class="wrap">
        <div class="sec fade">
          <div class="sec-head"><span class="sec-num">01</span><h2>generate</h2></div>

          <div class="qr-panel" style="max-width: 560px">
            <form class="qr-form" action="#" autocomplete="off">
              <div class="qr-row">
                <div class="qr-field">
                  <label for="rnd-min">minimum</label>
                  <input type="number" id="rnd-min" class="qr-input" value="1" />
                </div>
                <div class="qr-field">
                  <label for="rnd-max">maximum</label>
                  <input type="number" id="rnd-max" class="qr-input" value="100" />
                </div>
              </div>
              <div class="qr-row">
                <div class="qr-field">
                  <label for="rnd-count">how many</label>
                  <input type="number" id="rnd-count" class="qr-input" value="1" min="1" max="1000" />
                </div>
                <div class="qr-field">
                  <label for="rnd-decimals">decimals</label>
                  <select id="rnd-decimals" class="qr-select">
                    <option value="0" selected>0 (integer)</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                  </select>
                </div>
              </div>
              <div class="qr-field">
                <label class="qr-check"><input type="checkbox" id="rnd-unique" /> no duplicates (unique values)</label>
              </div>
              <button type="button" id="rnd-go" class="btn btn-fill">generate</button>
              <div class="rnd-error" id="rnd-error"></div>
            </form>
          </div>

          <div class="qr-panel" style="max-width: 560px; margin-top: 1.5rem">
            <span class="tool-hash-label">result</span>
            <div class="rnd-result is-empty" id="rnd-result">press generate.</div>
            <div class="rnd-actions">
              <button type="button" id="rnd-copy" class="btn btn-ghost" disabled>copy</button>
              <button type="button" id="rnd-again" class="btn btn-ghost">again</button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <footer>
      <a href="../tools.html">← tools</a>
      <a href="../index.html">leotrax3d</a>
    </footer>

    <script>
      (function () {
        var minEl = document.getElementById("rnd-min");
        var maxEl = document.getElementById("rnd-max");
        var countEl = document.getElementById("rnd-count");
        var decEl = document.getElementById("rnd-decimals");
        var uniqueEl = document.getElementById("rnd-unique");
        var resultEl = document.getElementById("rnd-result");
        var errorEl = document.getElementById("rnd-error");
        var copyBtn = document.getElementById("rnd-copy");
        var current = [];

        /* uniform random float in [0,1) from crypto */
        function rand01() {
          var u = new Uint32Array(1);
          crypto.getRandomValues(u);
          return u[0] / 4294967296;
        }

        function generate() {
          errorEl.textContent = "";
          var min = parseFloat(minEl.value);
          var max = parseFloat(maxEl.value);
          var count = Math.max(1, Math.min(1000, parseInt(countEl.value, 10) || 1));
          var dec = parseInt(decEl.value, 10);

          if (!isFinite(min) || !isFinite(max)) { errorEl.textContent = "min and max must be numbers."; return; }
          if (min > max) { var t = min; min = max; max = t; }

          var unique = uniqueEl.checked;
          if (unique && dec === 0) {
            var span = Math.floor(max) - Math.ceil(min) + 1;
            if (span < count) { errorEl.textContent = "range too small for " + count + " unique integers (only " + span + " available)."; return; }
          }

          var lo = Math.ceil(min), hi = Math.floor(max);
          var out = [];
          var seen = {};
          var guard = 0;
          while (out.length < count && guard < count * 200 + 1000) {
            guard++;
            var v;
            if (dec === 0) v = lo + Math.floor(rand01() * (hi - lo + 1));
            else v = parseFloat((min + rand01() * (max - min)).toFixed(dec));
            if (unique) { if (seen[v]) continue; seen[v] = true; }
            out.push(v);
          }
          current = out;
          render();
        }

        function render() {
          if (!current.length) { resultEl.textContent = "press generate."; resultEl.classList.add("is-empty"); copyBtn.disabled = true; return; }
          resultEl.classList.remove("is-empty");
          if (current.length === 1) {
            resultEl.innerHTML = '<div class="rnd-big">' + current[0] + "</div>";
          } else {
            resultEl.textContent = current.join(",  ");
          }
          copyBtn.disabled = false;
        }

        copyBtn.addEventListener("click", function () {
          var done = function () { copyBtn.textContent = "copied!"; setTimeout(function () { copyBtn.textContent = "copy"; }, 2000); };
          if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(current.join(", ")).then(done); else done();
        });
        document.getElementById("rnd-go").addEventListener("click", generate);
        document.getElementById("rnd-again").addEventListener("click", generate);
      })();
    </script>
    <script src="../site.js"></script>
  </body>
</html>
