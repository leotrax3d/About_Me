<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>password generator — leotrax3d</title>
    <meta name="description" content="generate NON secure random passwords with configurable length and character sets, entirely in your browser." />
    <meta name="author" content="leotrax3d" />
    <link rel="canonical" href="https://leotrax3d.github.io/About_Me/tools/password.html" />
    <link rel="icon" href="../favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=menu"
    />
    <link rel="stylesheet" href="../styles.css" />
    <style>
      .pw-output {
        background: var(--bg3);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 0.85rem 1rem;
        font-size: 15px;
        letter-spacing: 0.06em;
        color: var(--accent);
        word-break: break-all;
        line-height: 1.8;
        min-height: 3rem;
        font-weight: 500;
      }
      .pw-output.is-empty { color: var(--muted); font-size: 12px; font-weight: 400; letter-spacing: 0; }
      .pw-strength { display: flex; align-items: center; gap: 0.75rem; margin-top: 0.6rem; }
      .pw-strength-bar { flex: 1; height: 3px; background: var(--border); border-radius: 999px; overflow: hidden; }
      .pw-strength-fill { height: 100%; border-radius: 999px; transition: width 0.3s, background 0.3s; }
      .pw-strength-label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; width: 5rem; text-align: right; }
      .pw-actions { display: flex; gap: 0.6rem; flex-wrap: wrap; margin-top: 0.75rem; }
      .pw-range-row { display: flex; align-items: center; gap: 1rem; }
      .pw-range-row input[type=range] { flex: 1; accent-color: var(--accent); }
      .pw-range-val { font-size: 13px; color: var(--accent); font-weight: 700; min-width: 2rem; text-align: right; }
    </style>
  </head>
  <body class="page-password custom-cursor">
    <!-- Shared chrome injected by site.js -->

    <div class="page-header">
      <div class="wrap">
        <div class="page-eyebrow">
          leotrax3d &nbsp;·&nbsp; <span>password generator</span>
        </div>
        <h1>Password<br /><span class="dim">Generator</span></h1>
        <p class="page-sub">
          generate cryptographically random passwords with custom length and
          character sets. everything runs locally — nothing is sent anywhere.
        </p>
      </div>
    </div>

    <section id="generator">
      <div class="wrap">
        <div class="sec fade">
          <div class="sec-head">
            <span class="sec-num">01</span>
            <h2>generate</h2>
          </div>

          <div class="qr-panel" style="max-width: 560px">
            <form class="qr-form" action="#" autocomplete="off">

              <div class="qr-field">
                <label>length</label>
                <div class="pw-range-row">
                  <input type="range" id="pw-length" min="4" max="128" value="20" />
                  <span class="pw-range-val" id="pw-length-val">20</span>
                </div>
              </div>

              <div class="qr-field">
                <label>character sets</label>
                <label class="qr-check"><input type="checkbox" id="pw-upper" checked /> A–Z uppercase</label>
                <label class="qr-check"><input type="checkbox" id="pw-lower" checked /> a–z lowercase</label>
                <label class="qr-check"><input type="checkbox" id="pw-digits" checked /> 0–9 digits</label>
                <label class="qr-check"><input type="checkbox" id="pw-symbols" checked /> !@#$… symbols</label>
              </div>

              <div class="qr-field">
                <label>count</label>
                <select id="pw-count" class="qr-select">
                  <option value="1" selected>1 password</option>
                  <option value="5">5 passwords</option>
                  <option value="10">10 passwords</option>
                  <option value="20">20 passwords</option>
                </select>
              </div>

              <button type="button" id="pw-generate" class="btn btn-fill">generate</button>
            </form>
          </div>

          <div class="qr-panel" style="max-width: 560px; margin-top: 1.5rem" id="pw-result-panel">
            <span class="tool-hash-label">result</span>
            <div class="pw-output is-empty" id="pw-output">press generate to create a password.</div>
            <div class="pw-strength" id="pw-strength-row" hidden>
              <div class="pw-strength-bar"><div class="pw-strength-fill" id="pw-strength-fill"></div></div>
              <div class="pw-strength-label" id="pw-strength-label"></div>
            </div>
            <div class="pw-actions">
              <button type="button" id="pw-copy" class="btn btn-ghost" disabled>copy</button>
              <button type="button" id="pw-regen" class="btn btn-ghost">regenerate</button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <footer>
      <a href="../tools.html">← tools</a>
      <a href="../index.html">leotrax3d</a>
    </footer>

    <script>
      (function () {
        var UPPER = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        var LOWER = "abcdefghijklmnopqrstuvwxyz";
        var DIGITS = "0123456789";
        var SYMBOLS = "!@#$%^&*()-_=+[]{}|;:,.<>?";

        var lengthEl = document.getElementById("pw-length");
        var lengthVal = document.getElementById("pw-length-val");
        var upperEl = document.getElementById("pw-upper");
        var lowerEl = document.getElementById("pw-lower");
        var digitsEl = document.getElementById("pw-digits");
        var symbolsEl = document.getElementById("pw-symbols");
        var countEl = document.getElementById("pw-count");
        var generateBtn = document.getElementById("pw-generate");
        var regenBtn = document.getElementById("pw-regen");
        var copyBtn = document.getElementById("pw-copy");
        var outputEl = document.getElementById("pw-output");
        var strengthFill = document.getElementById("pw-strength-fill");
        var strengthLabel = document.getElementById("pw-strength-label");
        var strengthRow = document.getElementById("pw-strength-row");

        lengthEl.addEventListener("input", function () { lengthVal.textContent = lengthEl.value; });

        function buildAlphabet() {
          var a = "";
          if (upperEl.checked) a += UPPER;
          if (lowerEl.checked) a += LOWER;
          if (digitsEl.checked) a += DIGITS;
          if (symbolsEl.checked) a += SYMBOLS;
          return a;
        }

        function randPw(len, alphabet) {
          var arr = new Uint32Array(len);
          crypto.getRandomValues(arr);
          var pw = "";
          for (var i = 0; i < len; i++) pw += alphabet[arr[i] % alphabet.length];
          return pw;
        }

        function entropy(len, alphabetSize) {
          return len * Math.log2(alphabetSize);
        }

        function strengthInfo(bits) {
          if (bits < 28) return { label: "very weak", pct: 10, color: "#ff6b6b" };
          if (bits < 36) return { label: "weak", pct: 25, color: "#ff9f43" };
          if (bits < 60) return { label: "fair", pct: 50, color: "#ffd32a" };
          if (bits < 90) return { label: "strong", pct: 75, color: "#c5f13e" };
          return { label: "very strong", pct: 100, color: "#c5f13e" };
        }

        function generate() {
          var alphabet = buildAlphabet();
          if (!alphabet) { outputEl.textContent = "select at least one character set."; outputEl.classList.add("is-empty"); copyBtn.disabled = true; strengthRow.hidden = true; return; }
          var len = parseInt(lengthEl.value, 10);
          var count = parseInt(countEl.value, 10);
          var passwords = [];
          for (var i = 0; i < count; i++) passwords.push(randPw(len, alphabet));
          outputEl.textContent = passwords.join("\n");
          outputEl.classList.remove("is-empty");
          copyBtn.disabled = false;

          if (count === 1) {
            var bits = entropy(len, alphabet.length);
            var info = strengthInfo(bits);
            strengthFill.style.width = info.pct + "%";
            strengthFill.style.background = info.color;
            strengthLabel.textContent = info.label;
            strengthLabel.style.color = info.color;
            strengthRow.hidden = false;
          } else {
            strengthRow.hidden = true;
          }
        }

        copyBtn.addEventListener("click", function () {
          var done = function () { copyBtn.textContent = "copied!"; setTimeout(function () { copyBtn.textContent = "copy"; }, 2000); };
          if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(outputEl.textContent).then(done); else done();
        });

        generateBtn.addEventListener("click", generate);
        regenBtn.addEventListener("click", generate);
        generate();
      })();
    </script>
    <script src="../site.js"></script>
  </body>
</html>
