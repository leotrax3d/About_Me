<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>timestamp converter — leotrax3d</title>
    <meta name="description" content="convert unix timestamps to human-readable dates and vice versa, with live current time display." />
    <meta name="author" content="leotrax3d" />
    <link rel="canonical" href="https://leotrax3d.github.io/About_Me/tools/timestamp.html" />
    <link rel="icon" href="../favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=menu"
    />
    <link rel="stylesheet" href="../styles.css" />
    <style>
      .ts-now {
        background: var(--bg3);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 1rem 1.25rem;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.75rem 1.5rem;
      }
      .ts-now-item label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 3px; }
      .ts-now-item .ts-val { font-size: 13px; color: var(--accent); font-weight: 600; font-variant-numeric: tabular-nums; }
      .ts-output-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
      .ts-out-item { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 0.75rem; }
      .ts-out-item label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 4px; }
      .ts-out-item .ts-out-val { font-size: 12px; color: var(--text); word-break: break-all; line-height: 1.6; }
      .ts-out-item .ts-out-val.is-empty { color: var(--muted); }
      .ts-error { color: #ff6b6b; font-size: 11px; margin-top: 0.4rem; min-height: 1rem; }
      .ts-actions { display: flex; gap: 0.6rem; flex-wrap: wrap; margin-top: 0.75rem; }
      @media (max-width: 500px) { .ts-now, .ts-output-grid { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body class="page-timestamp custom-cursor">
    <!-- Shared chrome injected by site.js -->

    <div class="page-header">
      <div class="wrap">
        <div class="page-eyebrow">
          leotrax3d &nbsp;·&nbsp; <span>timestamp converter</span>
        </div>
        <h1>Time<br /><span class="dim">stamp</span></h1>
        <p class="page-sub">
          convert unix timestamps to human-readable dates and back. supports
          seconds and milliseconds, local and UTC time.
        </p>
      </div>
    </div>

    <section id="now">
      <div class="wrap">
        <div class="sec fade">
          <div class="sec-head">
            <span class="sec-num">01</span>
            <h2>current time</h2>
          </div>
          <div class="ts-now" id="ts-now">
            <div class="ts-now-item">
              <label>unix (seconds)</label>
              <div class="ts-val" id="ts-now-s">—</div>
            </div>
            <div class="ts-now-item">
              <label>unix (ms)</label>
              <div class="ts-val" id="ts-now-ms">—</div>
            </div>
            <div class="ts-now-item">
              <label>utc</label>
              <div class="ts-val" id="ts-now-utc" style="font-size:11px">—</div>
            </div>
            <div class="ts-now-item">
              <label>local</label>
              <div class="ts-val" id="ts-now-local" style="font-size:11px">—</div>
            </div>
          </div>
          <div style="margin-top: 0.75rem; display:flex; gap: 0.6rem;">
            <button type="button" id="ts-copy-now" class="btn btn-ghost">copy seconds</button>
            <button type="button" id="ts-use-now" class="btn btn-ghost">use as input ↓</button>
          </div>
        </div>
      </div>
    </section>

    <section id="converter">
      <div class="wrap">
        <div class="sec fade">
          <div class="sec-head">
            <span class="sec-num">02</span>
            <h2>convert</h2>
          </div>

          <div class="qr-panel" style="max-width: 640px">
            <form class="qr-form" action="#" autocomplete="off">

              <div class="qr-field">
                <label>direction</label>
                <div class="qr-toggle" id="dir-toggle" role="group">
                  <button type="button" class="btn btn-ghost is-active" data-dir="ts2dt">timestamp → date</button>
                  <button type="button" class="btn btn-ghost" data-dir="dt2ts">date → timestamp</button>
                </div>
              </div>

              <div class="qr-field" id="ts-input-field">
                <label for="ts-input">unix timestamp</label>
                <div style="display:flex;gap:0.5rem;align-items:center">
                  <input type="text" id="ts-input" class="qr-input" placeholder="1704067200" inputmode="numeric" spellcheck="false" style="flex:1" />
                  <div class="qr-toggle" id="unit-toggle" role="group" style="flex-shrink:0">
                    <button type="button" class="btn btn-ghost is-active" data-unit="s">s</button>
                    <button type="button" class="btn btn-ghost" data-unit="ms">ms</button>
                  </div>
                </div>
              </div>

              <div class="qr-field" id="dt-input-field" hidden>
                <label for="dt-input">date and time</label>
                <input type="datetime-local" id="dt-input" class="qr-input" />
              </div>

              <div class="ts-error" id="ts-error"></div>
            </form>
          </div>

          <div class="qr-panel" style="max-width: 640px; margin-top: 1.5rem">
            <span class="tool-hash-label">result</span>
            <div class="ts-output-grid" id="ts-output-grid">
              <div class="ts-out-item"><label>utc</label><div class="ts-out-val is-empty" id="ts-out-utc">—</div></div>
              <div class="ts-out-item"><label>local</label><div class="ts-out-val is-empty" id="ts-out-local">—</div></div>
              <div class="ts-out-item"><label>iso 8601</label><div class="ts-out-val is-empty" id="ts-out-iso">—</div></div>
              <div class="ts-out-item"><label>unix (s)</label><div class="ts-out-val is-empty" id="ts-out-s">—</div></div>
              <div class="ts-out-item"><label>unix (ms)</label><div class="ts-out-val is-empty" id="ts-out-ms">—</div></div>
              <div class="ts-out-item"><label>relative</label><div class="ts-out-val is-empty" id="ts-out-rel">—</div></div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <footer>
      <a href="../tools.html">← tools</a>
      <a href="../index.html">leotrax3d</a>
    </footer>

    <script>
      (function () {
        var tsInput = document.getElementById("ts-input");
        var dtInput = document.getElementById("dt-input");
        var tsError = document.getElementById("ts-error");
        var direction = "ts2dt";
        var unit = "s";

        /* ---- live clock ---- */
        function tickClock() {
          var now = Date.now();
          var s = Math.floor(now / 1000);
          document.getElementById("ts-now-s").textContent = s;
          document.getElementById("ts-now-ms").textContent = now;
          document.getElementById("ts-now-utc").textContent = new Date(now).toUTCString();
          document.getElementById("ts-now-local").textContent = new Date(now).toLocaleString();
        }
        tickClock();
        setInterval(tickClock, 1000);

        document.getElementById("ts-copy-now").addEventListener("click", function () {
          var val = String(Math.floor(Date.now() / 1000));
          var btn = this;
          if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(val).then(function () { btn.textContent = "copied!"; setTimeout(function () { btn.textContent = "copy seconds"; }, 2000); });
        });

        document.getElementById("ts-use-now").addEventListener("click", function () {
          if (direction === "ts2dt") {
            tsInput.value = String(Math.floor(Date.now() / 1000));
            unit = "s";
            document.querySelector('#unit-toggle .btn[data-unit="s"]').click();
            convert();
          }
        });

        /* ---- direction toggle ---- */
        document.querySelectorAll("#dir-toggle .btn").forEach(function (btn) {
          btn.addEventListener("click", function () {
            document.querySelectorAll("#dir-toggle .btn").forEach(function (b) { b.classList.remove("is-active"); });
            this.classList.add("is-active");
            direction = this.dataset.dir;
            document.getElementById("ts-input-field").toggleAttribute("hidden", direction !== "ts2dt");
            document.getElementById("dt-input-field").toggleAttribute("hidden", direction !== "dt2ts");
            convert();
          });
        });

        /* ---- unit toggle ---- */
        document.querySelectorAll("#unit-toggle .btn").forEach(function (btn) {
          btn.addEventListener("click", function () {
            document.querySelectorAll("#unit-toggle .btn").forEach(function (b) { b.classList.remove("is-active"); });
            this.classList.add("is-active");
            unit = this.dataset.unit;
            convert();
          });
        });

        function relativeTime(ms) {
          var diff = Date.now() - ms;
          var abs = Math.abs(diff);
          var future = diff < 0;
          var suf = future ? " from now" : " ago";
          if (abs < 60000) return Math.round(abs / 1000) + "s" + suf;
          if (abs < 3600000) return Math.round(abs / 60000) + "m" + suf;
          if (abs < 86400000) return Math.round(abs / 3600000) + "h" + suf;
          if (abs < 31536000000) return Math.round(abs / 86400000) + "d" + suf;
          return Math.round(abs / 31536000000) + "y" + suf;
        }

        function setOutputs(ms) {
          var d = new Date(ms);
          var ids = ["ts-out-utc", "ts-out-local", "ts-out-iso", "ts-out-s", "ts-out-ms", "ts-out-rel"];
          var vals = [d.toUTCString(), d.toLocaleString(), d.toISOString(), String(Math.floor(ms / 1000)), String(ms), relativeTime(ms)];
          ids.forEach(function (id, i) {
            var el = document.getElementById(id);
            el.textContent = vals[i];
            el.classList.remove("is-empty");
          });
        }

        function clearOutputs() {
          ["ts-out-utc","ts-out-local","ts-out-iso","ts-out-s","ts-out-ms","ts-out-rel"].forEach(function (id) {
            var el = document.getElementById(id);
            el.textContent = "—"; el.classList.add("is-empty");
          });
        }

        function convert() {
          tsError.textContent = "";
          if (direction === "ts2dt") {
            var raw = tsInput.value.trim();
            if (!raw) { clearOutputs(); return; }
            var n = Number(raw);
            if (!isFinite(n)) { tsError.textContent = "not a valid number"; clearOutputs(); return; }
            var ms = unit === "ms" ? n : n * 1000;
            if (ms < -8640000000000000 || ms > 8640000000000000) { tsError.textContent = "timestamp out of range"; clearOutputs(); return; }
            setOutputs(ms);
          } else {
            var val = dtInput.value;
            if (!val) { clearOutputs(); return; }
            var ms2 = new Date(val).getTime();
            if (isNaN(ms2)) { tsError.textContent = "invalid date"; clearOutputs(); return; }
            setOutputs(ms2);
          }
        }

        tsInput.addEventListener("input", convert);
        dtInput.addEventListener("input", convert);

        /* Set default datetime to now */
        var now = new Date();
        now.setSeconds(0, 0);
        dtInput.value = now.toISOString().slice(0, 16);
      })();
    </script>
    <script src="../site.js"></script>
  </body>
</html>
