<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>showcase — leotrax3d</title>

    <style>
      /* ---------------------------------------------------------------
         Showcase — a purely geometric surface. No copy, no chrome.
         Only shapes, lines and a wireframe solid. Black / white.

         Performance rules:
         - Animate ONLY transform + opacity (never width/height/top/left).
         - will-change: transform on every animated element.
         - Positions are read once on init / resize, never per frame.
      ----------------------------------------------------------------*/
      :root {
        --bg: #000000;
        --fg: #ffffff;
        --line: rgba(255, 255, 255, 0.14);
        --ease: cubic-bezier(0.16, 1, 0.3, 1);
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: var(--bg);
        color: var(--fg);
        overflow-x: hidden;
        /* Hide the native cursor — we draw our own. */
        cursor: none;
      }

      /* On touch / no-hover devices, restore the native cursor. */
      @media (hover: none), (pointer: coarse) {
        body {
          cursor: auto;
        }
        .cursor,
        .cursor-dot {
          display: none;
        }
      }

      /* Shared SVG primitive styling: outline only, crisp stroke. */
      svg.shape {
        display: block;
        overflow: visible;
      }
      svg.shape * {
        fill: none;
        stroke: var(--fg);
        stroke-width: 1;
        vector-effect: non-scaling-stroke;
      }

      /* ----------------------------- Custom cursor ------------------- */
      .cursor,
      .cursor-dot {
        position: fixed;
        top: 0;
        left: 0;
        pointer-events: none;
        z-index: 9999;
        transform: translate(-50%, -50%);
        will-change: transform;
        mix-blend-mode: difference;
      }
      .cursor {
        width: 36px;
        height: 36px;
        border: 1px solid var(--fg);
        border-radius: 50%;
      }
      .cursor-dot {
        width: 5px;
        height: 5px;
        background: var(--fg);
        border-radius: 50%;
      }
      body.cursor-hover .cursor {
        transform: translate(-50%, -50%) scale(1.8);
      }
      /* Magnet engaged: the ring fills solid white, the dot hides. */
      body.magnet-on .cursor {
        background: var(--fg);
        transform: translate(-50%, -50%) scale(1.25);
      }
      body.magnet-on .cursor-dot {
        opacity: 0;
      }

      /* --- Global scroll-progress line: one mark for the whole journey -- */
      .scroll-progress {
        position: fixed;
        top: 0;
        left: 0;
        width: 2px;
        height: 100vh;
        background: var(--fg);
        transform: scaleY(0);
        transform-origin: top center;
        will-change: transform;
        z-index: 90;
        mix-blend-mode: difference;
      }

      /* ----------------------------- Nav ----------------------------- */
      /* Geometry-only nav: a diamond mark and an arrow glyph (no words). */
      nav {
        position: fixed;
        inset: 0 0 auto 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1.6rem 2rem;
        z-index: 100;
        mix-blend-mode: difference;
      }
      .nav-mark,
      .nav-back {
        display: block;
        opacity: 0.85;
        transition: opacity 0.3s var(--ease), transform 0.4s var(--ease);
        will-change: transform;
      }
      .nav-mark:hover,
      .nav-back:hover {
        opacity: 1;
      }
      .nav-mark:hover {
        transform: rotate(90deg);
      }
      .nav-back:hover {
        transform: translateX(-4px);
      }

      /* ----------------------------- Sections ------------------------ */
      section {
        position: relative;
        width: 100%;
      }

      .center {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }

      /* Intro: a single circle — the portal. */
      .hero-art {
        width: clamp(220px, 46vmin, 560px);
        height: clamp(220px, 46vmin, 560px);
        /* Zoomed into from its centre on scroll. */
        transform-origin: center center;
        will-change: transform, opacity;
      }

      /* Scroll indicator: a vertical line that draws itself, repeatedly. */
      .scroll-line {
        position: absolute;
        bottom: 0;
        left: 50%;
        width: 1px;
        height: 64px;
        background: var(--fg);
        transform: translateX(-50%) scaleY(0);
        transform-origin: top center;
        will-change: transform, opacity;
        animation: scrollPulse 2.4s var(--ease) infinite;
      }
      @keyframes scrollPulse {
        0% {
          transform: translateX(-50%) scaleY(0);
          opacity: 0;
        }
        35% {
          opacity: 1;
        }
        100% {
          transform: translateX(-50%) scaleY(1);
          opacity: 0;
        }
      }

      /* --- Pin section: stays fixed while we scrub through panels ----- */
      .pin-section {
        height: 100vh;
        overflow: hidden;
      }
      .pin-track {
        display: flex;
        height: 100vh;
        /* Width set by JS to (panels * 100vw); only transform is animated. */
        will-change: transform;
      }
      .panel {
        flex: 0 0 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        border-right: 1px solid var(--line);
      }
      .panel .shape {
        width: clamp(140px, 32vmin, 360px);
        height: clamp(140px, 32vmin, 360px);
      }

      /* --- Smooth-scroll section: abstract bars reveal on enter ------- */
      .smooth-section {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: clamp(1.4rem, 4vh, 3.5rem);
        padding: 18vh 2rem;
      }
      .reveal-row {
        height: 2px;
        background: var(--fg);
        /* Lines draw outward from their centre — transform/opacity only. */
        opacity: 0;
        transform: scaleX(0);
        transform-origin: center center;
        will-change: transform, opacity;
      }

      /* --- WebGL section: floating wireframe icosahedron ------------- */
      .gl-section {
        height: 100vh;
        overflow: hidden;
      }
      .gl-stage {
        width: 100%;
        height: 100%;
      }
      .gl-stage canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      /* --- Interactive field: points that flee the cursor, ripple on tap */
      .field-section {
        height: 100vh;
        overflow: hidden;
      }
      .field-canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      /* Footer: a single point. Nothing more. */
      footer {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 7rem 2rem;
      }
      .footer-dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: var(--fg);
      }

      /* Respect users who don't want motion. */
      @media (prefers-reduced-motion: reduce) {
        .reveal-row {
          opacity: 1;
          transform: none;
        }
        .scroll-line {
          animation: none;
          opacity: 0.6;
          transform: translateX(-50%) scaleY(1);
        }
      }
    </style>
  </head>

  <body class="custom-cursor">
    <!-- Custom cursor nodes -->
    <div class="cursor" aria-hidden="true"></div>
    <div class="cursor-dot" aria-hidden="true"></div>

    <!-- Single line that draws with scroll progress — ties it all together -->
    <span class="scroll-progress" aria-hidden="true"></span>

    <nav>
      <!-- Diamond mark -> home -->
      <a href="index.html" class="nav-mark" data-cursor aria-label="home">
        <svg class="shape" width="16" height="16" viewBox="0 0 16 16">
          <rect
            x="3"
            y="3"
            width="10"
            height="10"
            transform="rotate(45 8 8)"
          />
        </svg>
      </a>
      <!-- Arrow -> back -->
      <a href="index.html" class="nav-back" data-cursor aria-label="back">
        <svg class="shape" width="34" height="12" viewBox="0 0 34 12">
          <line x1="34" y1="6" x2="2" y2="6" />
          <polyline points="8,1 1,6 8,11" />
        </svg>
      </a>
    </nav>

    <!-- Intro: a single circle — the portal you fall through -->
    <section class="center" id="intro">
      <svg
        class="shape hero-art"
        data-cursor
        viewBox="0 0 200 200"
        aria-hidden="true"
      >
        <circle cx="100" cy="100" r="70" />
      </svg>
      <span class="scroll-line" aria-hidden="true"></span>
    </section>

    <!-- Pin section: horizontal scrub through three primitives -->
    <section class="pin-section" id="pin">
      <div class="pin-track" id="pin-track">
        <article class="panel">
          <svg class="shape" viewBox="0 0 200 200" aria-hidden="true">
            <circle cx="100" cy="100" r="92" />
          </svg>
        </article>
        <article class="panel">
          <svg class="shape" viewBox="0 0 200 200" aria-hidden="true">
            <rect x="12" y="12" width="176" height="176" />
          </svg>
        </article>
        <article class="panel">
          <svg class="shape" viewBox="0 0 200 200" aria-hidden="true">
            <polygon points="100,8 192,184 8,184" />
          </svg>
        </article>
      </div>
    </section>

    <!-- Smooth-scroll reveal: abstract horizontal bars -->
    <section class="smooth-section" id="smooth">
      <div class="reveal-row" style="width: clamp(80px, 18vw, 240px)"></div>
      <div class="reveal-row" style="width: clamp(160px, 40vw, 540px)"></div>
      <div class="reveal-row" style="width: clamp(120px, 28vw, 360px)"></div>
      <div class="reveal-row" style="width: clamp(220px, 56vw, 760px)"></div>
      <div class="reveal-row" style="width: clamp(100px, 22vw, 300px)"></div>
    </section>

    <!-- WebGL section: floating wireframe icosahedron (geometry only) -->
    <section class="gl-section" id="gl">
      <div class="gl-stage" id="gl-stage" aria-hidden="true"></div>
    </section>

    <!-- Interactive field: points spring from the cursor, ripple on tap -->
    <section class="field-section" id="field">
      <canvas class="field-canvas" id="field-canvas" aria-hidden="true"></canvas>
    </section>

    <footer>
      <span class="footer-dot" aria-hidden="true"></span>
    </footer>

    <!-- Three.js via CDN (global UMD build) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- GSAP 3.12 + ScrollTrigger via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

    <script>
      (function () {
        "use strict";

        const reduceMotion = window.matchMedia(
          "(prefers-reduced-motion: reduce)"
        ).matches;
        const canHover = window.matchMedia("(hover: hover)").matches;

        /* ============================================================
           1. CUSTOM CURSOR  — gsap.quickTo for sub-frame latency.
           quickTo returns a tween-setter we call with the latest
           pointer position; GSAP interpolates internally, so we never
           read layout inside the pointermove handler.
        ============================================================ */
        if (canHover && !reduceMotion && typeof gsap !== "undefined") {
          const ring = document.querySelector(".cursor");
          const dot = document.querySelector(".cursor-dot");

          // Pre-built quickTo setters: only transform is touched.
          const ringX = gsap.quickTo(ring, "x", {
            duration: 0.4,
            ease: "power3",
          });
          const ringY = gsap.quickTo(ring, "y", {
            duration: 0.4,
            ease: "power3",
          });
          const dotX = gsap.quickTo(dot, "x", { duration: 0.12, ease: "power3" });
          const dotY = gsap.quickTo(dot, "y", { duration: 0.12, ease: "power3" });

          window.addEventListener(
            "pointermove",
            (e) => {
              let tx = e.clientX;
              let ty = e.clientY;

              // Magnetic pull: while the field's activation circle is armed,
              // bend the rendered cursor toward it so it gets "sucked in".
              const m = window.__magnet;
              if (m && m.enabled && !m.active) {
                const dx = m.cx - tx;
                const dy = m.cy - ty;
                const d = Math.hypot(dx, dy);
                if (d < m.snapR) {
                  const pull = (1 - d / m.snapR) * 0.7;
                  tx += dx * pull;
                  ty += dy * pull;
                }
              }

              ringX(tx);
              ringY(ty);
              dotX(tx);
              dotY(ty);
            },
            { passive: true }
          );

          // Hover affordance — toggled by class, animated via transform.
          document.querySelectorAll("[data-cursor]").forEach((el) => {
            el.addEventListener("pointerenter", () =>
              document.body.classList.add("cursor-hover")
            );
            el.addEventListener("pointerleave", () =>
              document.body.classList.remove("cursor-hover")
            );
          });
        }

        if (typeof gsap === "undefined" || typeof ScrollTrigger === "undefined") {
          return; // CDN unavailable — page still renders statically.
        }
        gsap.registerPlugin(ScrollTrigger);

        if (reduceMotion) {
          return; // Honour reduced-motion: leave the static layout as-is.
        }

        /* ============================================================
           2. CONNECTIVE TISSUE — one progress line for the whole scroll.
           Scrubbed against total document scroll; only scaleY changes.
        ============================================================ */
        gsap.to(".scroll-progress", {
          scaleY: 1,
          ease: "none",
          scrollTrigger: {
            start: 0,
            end: () => ScrollTrigger.maxScroll(window),
            scrub: 0.3,
            invalidateOnRefresh: true,
          },
        });

        /* ============================================================
           3. SCROLL INTO THE CIRCLE — the intro pins, then the circle
           scales up from its centre and dissolves, so the viewer falls
           *through* the portal into the journey. Pure transform + opacity.
        ============================================================ */
        gsap
          .timeline({
            scrollTrigger: {
              trigger: "#intro",
              start: "top top",
              end: "+=120%",
              pin: true,
              scrub: 1,
            },
          })
          .to(".scroll-line", { opacity: 0, duration: 0.15 }, 0)
          .to(".hero-art", { scale: 9, opacity: 0, ease: "power2.in" }, 0);

        /* ============================================================
           4. PIN SECTION — horizontal scrub, shapes rotate as they pass.
           The track width is read ONCE here (re-read on resize via
           ScrollTrigger.refresh()). Track translation and per-shape
           rotation share one timeline, so nothing is read per frame —
           ScrollTrigger only writes transforms.
        ============================================================ */
        const track = document.getElementById("pin-track");

        gsap
          .timeline({
            scrollTrigger: {
              trigger: "#pin",
              pin: true,
              scrub: 1,
              invalidateOnRefresh: true,
              // Scroll length == horizontal overflow, computed on refresh.
              end: () => "+=" + (track.scrollWidth - window.innerWidth),
            },
          })
          .to(
            track,
            {
              // x recomputed only on refresh (init + resize), not per frame.
              x: () => -(track.scrollWidth - window.innerWidth),
              ease: "none",
            },
            0
          )
          .to(
            ".panel .shape",
            { rotate: 180, ease: "none" },
            0
          );

        // As the last panel settles, the icosahedron grows in from a point,
        // continuing the line of motion into the WebGL section.
        gsap.from("#gl-stage", {
          scale: 0.55,
          opacity: 0,
          ease: "power2.out",
          scrollTrigger: {
            trigger: "#gl",
            start: "top 85%",
            end: "top 35%",
            scrub: true,
          },
        });

        /* ============================================================
           5. SMOOTH-SCROLL REVEAL — bars draw outward from centre.
           ScrollTrigger.batch reads positions on refresh and groups
           entering elements into a single staggered tween.
        ============================================================ */
        ScrollTrigger.batch(".reveal-row", {
          start: "top 85%",
          onEnter: (batch) =>
            gsap.to(batch, {
              opacity: 1,
              scaleX: 1,
              duration: 0.9,
              ease: "power3.out",
              stagger: { each: 0.08, from: "center" },
              overwrite: true,
            }),
          onLeaveBack: (batch) =>
            gsap.to(batch, {
              opacity: 0,
              scaleX: 0,
              duration: 0.4,
              ease: "power2.in",
              overwrite: true,
            }),
        });

        /* ============================================================
           6. RESIZE — recompute everything in one place.
           ScrollTrigger.refresh() re-runs the function-based values
           above; we debounce so layout reads happen at most once per
           resize burst, never per frame.
        ============================================================ */
        let resizeTimer;
        window.addEventListener("resize", () => {
          clearTimeout(resizeTimer);
          resizeTimer = setTimeout(() => ScrollTrigger.refresh(), 200);
        });
      })();
    </script>

    <script>
      /* ================================================================
         THREE.JS — floating wireframe icosahedron (white edges on black).
         - Auto-rotates slowly on its own.
         - While the pointer is inside the section, rotation is coupled
           directly to the mouse position (mousemove).
         - requestAnimationFrame render loop, paused when off-screen.
         - Responsive: canvas + camera resync to the container on resize.
      ================================================================ */
      (function () {
        "use strict";

        if (typeof THREE === "undefined") return; // CDN unavailable.

        const stage = document.getElementById("gl-stage");
        if (!stage) return;

        // --- Sizing helpers: read the container once, reuse the values. ---
        let width = stage.clientWidth;
        let height = stage.clientHeight;

        // --- Scene / camera / renderer -----------------------------------
        const scene = new THREE.Scene();

        const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 100);
        camera.position.z = 4;

        const renderer = new THREE.WebGLRenderer({
          antialias: true,
          alpha: true,
        });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(width, height);
        renderer.setClearColor(0x000000, 1);
        stage.appendChild(renderer.domElement);

        // --- Wireframe icosahedron: only the 30 edges, pure white --------
        const geometry = new THREE.IcosahedronGeometry(1.3, 0);
        const edges = new THREE.EdgesGeometry(geometry);
        const material = new THREE.LineBasicMaterial({ color: 0xffffff });
        const ico = new THREE.LineSegments(edges, material);
        scene.add(ico);

        // --- Interaction state -------------------------------------------
        let pointerInside = false;
        // Cached bounds — refreshed on resize/scroll, never per frame.
        let rect = stage.getBoundingClientRect();
        // Normalised pointer (-1..1) relative to the section.
        const pointer = { x: 0, y: 0 };
        // Target rotation the mesh eases toward while the pointer is inside.
        const target = { x: 0, y: 0 };

        stage.addEventListener("pointerenter", () => {
          pointerInside = true;
        });
        stage.addEventListener("pointerleave", () => {
          pointerInside = false;
        });
        stage.addEventListener(
          "pointermove",
          (e) => {
            // Use the cached rect; refreshed on resize, not per move.
            pointer.x = (e.clientX - rect.left) / rect.width - 0.5;
            pointer.y = (e.clientY - rect.top) / rect.height - 0.5;
            target.y = pointer.x * Math.PI; // horizontal drag -> yaw
            target.x = pointer.y * Math.PI; // vertical drag   -> pitch
          },
          { passive: true }
        );

        // --- Render loop --------------------------------------------------
        let running = true;

        function tick() {
          if (!running) return;

          if (pointerInside) {
            // Ease current rotation toward the mouse-driven target.
            ico.rotation.x += (target.x - ico.rotation.x) * 0.06;
            ico.rotation.y += (target.y - ico.rotation.y) * 0.06;
          } else {
            // Idle: slow, steady self-rotation.
            ico.rotation.x += 0.0015;
            ico.rotation.y += 0.0025;
          }

          renderer.render(scene, camera);
          requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);

        // Pause rendering while the section is off-screen (battery / GPU).
        if ("IntersectionObserver" in window) {
          new IntersectionObserver(
            (entries) => {
              const visible = entries[0].isIntersecting;
              if (visible && !running) {
                running = true;
                requestAnimationFrame(tick);
              } else if (!visible) {
                running = false;
              }
            },
            { threshold: 0 }
          ).observe(stage);
        }

        // --- Resize: recompute size + aspect once per resize burst -------
        function onResize() {
          width = stage.clientWidth;
          height = stage.clientHeight;
          rect = stage.getBoundingClientRect();

          camera.aspect = width / height;
          camera.updateProjectionMatrix();
          renderer.setSize(width, height);
        }

        let resizeTimer;
        window.addEventListener("resize", () => {
          clearTimeout(resizeTimer);
          resizeTimer = setTimeout(onResize, 150);
        });
        // Keep the cached rect correct after scroll without per-frame reads.
        window.addEventListener(
          "scroll",
          () => {
            rect = stage.getBoundingClientRect();
          },
          { passive: true }
        );
      })();
    </script>

    <script>
      /* ================================================================
         INTERACTIVE FIELD — the story's climax, told only with points.

         1. A grid of white points breathes calmly and flees your cursor.
         2. A single small circle (the "core") sits at the centre. The
            cursor is magnetically drawn into it; on contact the cursor
            fills solid white and becomes a MAGNET.
         3. From then on every point is pulled toward the cursor and
            clings to it — you have to get rid of them.
         4. While the magnet is on you may scroll only at one fixed, slow
            speed; you steer the clinging points back into the core, where
            they are consumed and vanish.
         5. When the last point is gone the magnet releases and scrolling
            is free again — all that noise reduced to a single circle.

         Canvas + requestAnimationFrame; rebuilt on resize; paused
         off-screen. The only input is the user's pointer.
      ================================================================ */
      (function () {
        "use strict";

        const canvas = document.getElementById("field-canvas");
        if (!canvas) return;
        const ctx = canvas.getContext("2d");
        if (!ctx) return;

        const reduceMotion = window.matchMedia(
          "(prefers-reduced-motion: reduce)"
        ).matches;

        // Shared with the custom-cursor script so it can snap into the core.
        const shared = (window.__magnet = {
          enabled: false, // core armed, cursor may snap in
          active: false, // magnet engaged
          cx: 0, // core centre, viewport coords
          cy: 0,
          snapR: 130, // cursor snap range (viewport px)
        });

        const GAP = 44; // grid spacing in CSS px
        const DOT = 1.4; // base dot radius
        const SPRING = 0.05; // pull idle points back to rest
        const DAMP = 0.86; // velocity damping
        const FLEE_R = 150; // idle cursor repulsion radius
        const FLEE = 26; // idle repulsion strength
        const CORE_R = 38; // core circle radius (canvas px)
        const ACT_R = CORE_R + 14; // distance that arms activation
        const MAG_SETTLE = 120; // within this the pull eases (points settle)
        const MAG_PULL = 0.9; // magnet acceleration
        const DRAIN_R = CORE_R + 6; // captured points within this vanish
        const WHEEL_CAP = 26; // max scroll step while magnet on

        let dpr = 1;
        let width = 0;
        let height = 0;
        let points = [];
        let sparks = []; // little vanish rings when a point is consumed
        let rect = canvas.getBoundingClientRect();

        // Cursor position in canvas coords + whether it's over the section.
        const pointer = { x: 0, y: 0, active: false };
        let inView = false;
        let clampActive = false;

        // --- Build / rebuild: positions read once here, never per frame. --
        function build() {
          dpr = Math.min(window.devicePixelRatio || 1, 2);
          width = canvas.clientWidth;
          height = canvas.clientHeight;
          rect = canvas.getBoundingClientRect();

          canvas.width = Math.round(width * dpr);
          canvas.height = Math.round(height * dpr);
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

          // Centre the grid within the canvas.
          const cols = Math.floor(width / GAP);
          const rows = Math.floor(height / GAP);
          const offX = (width - (cols - 1) * GAP) / 2;
          const offY = (height - (rows - 1) * GAP) / 2;

          points = [];
          for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
              const ox = offX + c * GAP;
              const oy = offY + r * GAP;
              points.push({
                ox,
                oy,
                x: ox,
                y: oy,
                vx: 0,
                vy: 0,
                phase: (c + r) * 0.6, // breathing offset
              });
            }
          }
        }

        // --- Static render for reduced-motion: draw grid + core once. ----
        function drawStatic() {
          ctx.clearRect(0, 0, width, height);
          ctx.strokeStyle = "#ffffff";
          ctx.lineWidth = 1;
          ctx.globalAlpha = 0.6;
          ctx.beginPath();
          ctx.arc(width / 2, height / 2, CORE_R, 0, Math.PI * 2);
          ctx.stroke();
          ctx.globalAlpha = 1;
          ctx.fillStyle = "#ffffff";
          ctx.beginPath();
          for (const p of points) {
            ctx.moveTo(p.x + DOT, p.y);
            ctx.arc(p.x, p.y, DOT, 0, Math.PI * 2);
          }
          ctx.fill();
        }

        // --- Animated frame ----------------------------------------------
        let running = true;
        let t = 0;

        function frame() {
          if (!running) return;
          t += 0.016;

          const cx = width / 2;
          const cy = height / 2;
          const vh = window.innerHeight;

          // Is the section the centred, "active" beat right now?
          inView = rect.top < vh * 0.6 && rect.bottom > vh * 0.4;

          // Leaving mid-task resets the puzzle (points spring back, cursor
          // un-fills) so the magnet never gets stuck on elsewhere.
          if (shared.active && !inView) {
            shared.active = false;
            document.body.classList.remove("magnet-on");
          }

          // Expose the core's viewport position for the cursor's magnet snap.
          shared.cx = rect.left + cx;
          shared.cy = rect.top + cy;
          shared.enabled = inView && !shared.active && points.length > 0;

          // Activation: the real cursor reaches the core circle.
          if (shared.enabled && pointer.active) {
            const d = Math.hypot(pointer.x - cx, pointer.y - cy);
            if (d < ACT_R) {
              shared.active = true;
              shared.enabled = false;
              document.body.classList.add("magnet-on");
            }
          }

          // Scroll is capped only while there is work to do, here, on screen.
          clampActive = shared.active && points.length > 0 && inView;

          ctx.clearRect(0, 0, width, height);

          // --- The core circle ------------------------------------------
          const pulse = 1 + Math.sin(t * 2) * 0.05;
          ctx.strokeStyle = "#ffffff";
          ctx.lineWidth = 1;
          ctx.globalAlpha = shared.active ? 1 : 0.6 + Math.sin(t * 2) * 0.2;
          ctx.beginPath();
          ctx.arc(cx, cy, CORE_R * pulse, 0, Math.PI * 2);
          ctx.stroke();
          if (shared.active) {
            // A live drain gains an inner ring.
            ctx.globalAlpha = 0.5;
            ctx.beginPath();
            ctx.arc(cx, cy, CORE_R * 0.5 * pulse, 0, Math.PI * 2);
            ctx.stroke();
          }
          ctx.globalAlpha = 1;

          // --- Vanish sparks (a point consumed by the core) -------------
          for (let i = sparks.length - 1; i >= 0; i--) {
            const s = sparks[i];
            s.r += 4;
            s.life -= 0.05;
            if (s.life <= 0) {
              sparks.splice(i, 1);
              continue;
            }
            ctx.globalAlpha = Math.max(s.life, 0);
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            ctx.stroke();
          }
          ctx.globalAlpha = 1;

          // --- Points: integrate forces, batch-draw in a single path ----
          ctx.fillStyle = "#ffffff";
          ctx.beginPath();
          for (let i = points.length - 1; i >= 0; i--) {
            const p = points[i];
            let ax;
            let ay;

            if (shared.active) {
              // Magnet: pull every point toward the cursor; near it the
              // pull eases so they cluster instead of jittering.
              const dx = pointer.x - p.x;
              const dy = pointer.y - p.y;
              const d = Math.hypot(dx, dy) || 0.01;
              const f =
                d > MAG_SETTLE ? MAG_PULL : (d / MAG_SETTLE) * MAG_PULL;
              ax = (dx / d) * f;
              ay = (dy / d) * f;
            } else {
              // Idle: spring to rest + flee the cursor.
              ax = (p.ox - p.x) * SPRING;
              ay = (p.oy - p.y) * SPRING;
              if (pointer.active) {
                const dx = p.x - pointer.x;
                const dy = p.y - pointer.y;
                const d2 = dx * dx + dy * dy;
                if (d2 < FLEE_R * FLEE_R && d2 > 0.01) {
                  const d = Math.sqrt(d2);
                  const f = (1 - d / FLEE_R) * FLEE;
                  ax += (dx / d) * f * SPRING;
                  ay += (dy / d) * f * SPRING;
                }
              }
            }

            p.vx = (p.vx + ax) * DAMP;
            p.vy = (p.vy + ay) * DAMP;
            p.x += p.vx;
            p.y += p.vy;

            // Consume points steered into the core while the magnet is on.
            if (shared.active) {
              const dd = Math.hypot(p.x - cx, p.y - cy);
              if (dd < DRAIN_R) {
                sparks.push({ x: p.x, y: p.y, r: 4, life: 1 });
                points.splice(i, 1);
                continue;
              }
            }

            const disp = Math.abs(p.x - p.ox) + Math.abs(p.y - p.oy);
            const r =
              DOT +
              Math.sin(t * 1.6 + p.phase) * 0.3 +
              Math.min(disp * 0.05, 2.2);
            ctx.moveTo(p.x + r, p.y);
            ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
          }
          ctx.fill();

          // Story resolved: last point gone -> release magnet + scroll.
          if (shared.active && points.length === 0) {
            shared.active = false;
            clampActive = false;
            document.body.classList.remove("magnet-on");
          }

          requestAnimationFrame(frame);
        }

        // --- Input: track the cursor in canvas coords (window-wide, so the
        //     magnet keeps working right to the section's edges). ----------
        window.addEventListener(
          "pointermove",
          (e) => {
            pointer.x = e.clientX - rect.left;
            pointer.y = e.clientY - rect.top;
            pointer.active =
              e.clientX >= rect.left &&
              e.clientX <= rect.right &&
              e.clientY >= rect.top &&
              e.clientY <= rect.bottom;
          },
          { passive: true }
        );

        // While the magnet is engaged, scrolling is held to one fixed speed
        // so you must steer the points into the core rather than blast past.
        window.addEventListener(
          "wheel",
          (e) => {
            if (!clampActive) return;
            e.preventDefault();
            const dir = e.deltaY > 0 ? 1 : e.deltaY < 0 ? -1 : 0;
            const mag =
              e.deltaMode === 0 ? Math.min(Math.abs(e.deltaY), WHEEL_CAP) : WHEEL_CAP;
            window.scrollBy(0, dir * mag);
          },
          { passive: false }
        );

        // --- Lifecycle ----------------------------------------------------
        build();
        if (reduceMotion) {
          drawStatic();
        } else {
          requestAnimationFrame(frame);
        }

        if ("IntersectionObserver" in window && !reduceMotion) {
          new IntersectionObserver(
            (entries) => {
              const visible = entries[0].isIntersecting;
              if (visible && !running) {
                running = true;
                requestAnimationFrame(frame);
              } else if (!visible) {
                running = false;
              }
            },
            { threshold: 0 }
          ).observe(canvas);
        }

        // --- Resize / scroll: recompute once, never per frame. ------------
        let resizeTimer;
        window.addEventListener("resize", () => {
          clearTimeout(resizeTimer);
          resizeTimer = setTimeout(() => {
            build();
            if (reduceMotion) drawStatic();
          }, 150);
        });
        window.addEventListener(
          "scroll",
          () => {
            rect = canvas.getBoundingClientRect();
          },
          { passive: true }
        );
      })();
    </script>
  </body>
</html>
