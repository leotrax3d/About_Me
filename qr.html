<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>qr generator - leotrax3d</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=menu"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="page-qr custom-cursor">
    <!-- Shared chrome (background field, cursor, terminal, nav) is
         injected by site.js. -->

    <div class="page-header">
      <div class="wrap">
        <div class="page-eyebrow">
          leotrax3d &nbsp;-&nbsp; <span>qr lab</span>
        </div>
        <h1>
          QR<br />
          <span class="dim">Generator</span>
        </h1>
        <p class="page-sub">
          Paste any text or URL, pick the size and error correction, and
          download your QR code as a PNG.
        </p>
      </div>
    </div>

    <section id="generator">
      <div class="wrap">
        <div class="sec fade">
          <div class="sec-head">
            <span class="sec-num">01</span>
            <h2>generate</h2>
          </div>
          <div class="qr-grid">
            <div class="qr-panel">
              <form class="qr-form" action="#" autocomplete="off">
                <div class="qr-field">
                  <label>mode</label>
                  <div class="qr-toggle" role="tablist">
                    <button
                      class="btn btn-ghost is-active"
                      type="button"
                      data-mode="url"
                    >
                      website
                    </button>
                    <button
                      class="btn btn-ghost"
                      type="button"
                      data-mode="text"
                    >
                      text
                    </button>
                  </div>
                </div>
                <div class="qr-field">
                  <label for="qr-text">text / url</label>
                  <textarea
                    id="qr-text"
                    class="qr-textarea"
                    placeholder="https://example.com"
                  ></textarea>
                  <div class="qr-meta"><span id="qr-count">0</span> chars</div>
                </div>
                <div class="qr-row">
                  <div class="qr-field">
                    <label for="qr-size">size</label>
                    <select id="qr-size" class="qr-select">
                      <option value="200">200 px</option>
                      <option value="260" selected>260 px</option>
                      <option value="320">320 px</option>
                      <option value="400">400 px</option>
                    </select>
                  </div>
                  <div class="qr-field">
                    <label for="qr-ecc">error correction</label>
                    <select id="qr-ecc" class="qr-select">
                      <option value="L">L (7%)</option>
                      <option value="M" selected>M (15%)</option>
                      <option value="Q">Q (25%)</option>
                      <option value="H">H (30%)</option>
                    </select>
                  </div>
                </div>
                <div class="qr-field">
                  <label for="qr-margin">quiet zone</label>
                  <select id="qr-margin" class="qr-select">
                    <option value="1">1 unit</option>
                    <option value="2" selected>2 units</option>
                    <option value="3">3 units</option>
                    <option value="4">4 units</option>
                  </select>
                </div>
                <div class="qr-row">
                  <div class="qr-field">
                    <label for="qr-fg">qr color</label>
                    <input
                      id="qr-fg"
                      class="qr-color"
                      type="color"
                      value="#0d0e0f"
                    />
                  </div>
                  <div class="qr-field">
                    <label for="qr-bg">background</label>
                    <input
                      id="qr-bg"
                      class="qr-color"
                      type="color"
                      value="#e8e6e0"
                    />
                  </div>
                </div>
                <div class="qr-field">
                  <label class="qr-check">
                    <input id="qr-transparent" type="checkbox" />
                    transparent background
                  </label>
                </div>
                <div class="qr-actions">
                  <button class="btn btn-ghost" id="qr-copy" type="button">
                    copy link
                  </button>
                  <button class="btn btn-ghost" id="qr-clear" type="button">
                    clear
                  </button>
                  <select id="qr-format" class="qr-select">
                    <option value="png" selected>png</option>
                    <option value="jpg">jpg</option>
                    <option value="svg">svg</option>
                  </select>
                  <button
                    class="btn btn-fill"
                    id="qr-download"
                    type="button"
                    disabled
                  >
                    download
                  </button>
                </div>
              </form>
            </div>
            <div class="qr-preview">
              <div class="qr-canvas-wrap">
                <div id="qrcode"></div>
              </div>
              <div class="qr-status" id="qr-status">
                enter text to generate a QR code.
              </div>
              <div class="qr-link-row is-hidden" id="qr-link-row">
                <a
                  class="btn btn-ghost"
                  id="qr-link"
                  href="#"
                  target="_blank"
                  rel="noopener"
                >
                  open link
                </a>
              </div>
              <div class="qr-lib">library: QRCode.js (qrcodejs)</div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <footer>
      <a href="index.html"><- back to leotrax3d</a>
      <a href="https://github.com/leotrax3d" target="_blank"
        >github.com/leotrax3d</a
      >
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
      // QR generator — page-specific; shared chrome is in site.js.
      const qrText = document.querySelector("#qr-text");
      const qrSize = document.querySelector("#qr-size");
      const qrEcc = document.querySelector("#qr-ecc");
      const qrMargin = document.querySelector("#qr-margin");
      const qrFg = document.querySelector("#qr-fg");
      const qrBg = document.querySelector("#qr-bg");
      const qrTransparent = document.querySelector("#qr-transparent");
      const qrFormat = document.querySelector("#qr-format");
      const qrContainer = document.querySelector("#qrcode");
      const qrCanvasWrap = document.querySelector(".qr-canvas-wrap");
      const qrStatus = document.querySelector("#qr-status");
      const qrLinkRow = document.querySelector("#qr-link-row");
      const qrLink = document.querySelector("#qr-link");
      const qrCopy = document.querySelector("#qr-copy");
      const qrCount = document.querySelector("#qr-count");
      const qrPreview = document.querySelector(".qr-preview");
      const qrDownload = document.querySelector("#qr-download");
      const qrClear = document.querySelector("#qr-clear");
      const modeButtons = document.querySelectorAll("[data-mode]");
      let qrMode = "url";
      let lastRender = null;

      const setStatus = (text) => {
        qrStatus.textContent = text;
      };

      const setMode = (mode) => {
        qrMode = mode;
        modeButtons.forEach((button) => {
          button.classList.toggle("is-active", button.dataset.mode === mode);
        });
        qrCopy.textContent = qrMode === "url" ? "copy link" : "copy text";
        renderQr();
      };

      const updateDownloadLabel = () => {
        qrDownload.textContent = `download ${qrFormat.value}`;
      };

      const updateBackgroundState = () => {
        const isTransparent = qrTransparent.checked;
        qrBg.disabled = isTransparent;
        qrBg.setAttribute("aria-disabled", isTransparent ? "true" : "false");
      };

      const normalizeUrl = (value) => {
        const trimmed = value.trim();
        if (!trimmed) return "";
        if (/^[a-zA-Z][a-zA-Z\d+.-]*:/.test(trimmed)) {
          return trimmed;
        }
        return `https://${trimmed}`;
      };

      const getCorrectLevel = (value) => {
        if (!window.QRCode || !QRCode.CorrectLevel) {
          return QRCode.CorrectLevel.M;
        }
        return QRCode.CorrectLevel[value] || QRCode.CorrectLevel.M;
      };

      const updateCount = () => {
        qrCount.textContent = `${qrText.value.length}`;
      };

      const getMaxQrSize = (requested, margin, paddingBase) => {
        if (!qrPreview) return requested;
        const previewWidth = qrPreview.clientWidth;
        if (!previewWidth) return requested;
        const padding = margin * paddingBase * 2 + 10;
        const available = previewWidth - padding;
        return Math.max(140, Math.min(requested, Math.floor(available)));
      };

      const renderQr = () => {
        const raw = qrText.value.trim();
        if (!raw) {
          qrContainer.innerHTML = "";
          setStatus("enter text to generate a QR code.");
          qrDownload.disabled = true;
          qrLinkRow.classList.add("is-hidden");
          lastRender = null;
          return;
        }
        if (!window.QRCode) {
          setStatus("QR library failed to load. Check your connection.");
          qrDownload.disabled = true;
          qrLinkRow.classList.add("is-hidden");
          lastRender = null;
          return;
        }
        const text = qrMode === "url" ? normalizeUrl(raw) : raw;
        const size = Number(qrSize.value);
        const margin = Number(qrMargin.value);
        const ecc = qrEcc.value;
        const paddingBase = 6;
        const finalSize = getMaxQrSize(size, margin, paddingBase);
        const fg = qrFg.value;
        const bg = qrBg.value;
        const transparent = qrTransparent.checked;
        const lightColor = transparent ? "rgba(0,0,0,0)" : bg;
        qrCanvasWrap.style.padding = `${margin * paddingBase}px`;
        qrCanvasWrap.style.background = transparent ? "transparent" : bg;
        qrContainer.innerHTML = "";
        new QRCode(qrContainer, {
          text,
          width: finalSize,
          height: finalSize,
          colorDark: fg,
          colorLight: lightColor,
          correctLevel: getCorrectLevel(ecc),
        });
        if (qrMode === "url") {
          qrLink.href = text;
          qrLinkRow.classList.remove("is-hidden");
        } else {
          qrLinkRow.classList.add("is-hidden");
        }
        setStatus(`${text.length} chars - ${finalSize}px - ECC ${ecc}`);
        qrDownload.disabled = false;
        lastRender = {
          text,
          size: finalSize,
          margin,
          paddingBase,
          fg,
          bg,
          transparent,
        };
      };

      const buildExportCanvas = () => {
        if (!lastRender) return null;
        const node = qrContainer.querySelector("canvas, img");
        if (!node) return null;
        const padding = lastRender.margin * lastRender.paddingBase;
        const exportSize = lastRender.size + padding * 2;
        const exportCanvas = document.createElement("canvas");
        exportCanvas.width = exportSize;
        exportCanvas.height = exportSize;
        const ctx = exportCanvas.getContext("2d");
        const needsOpaque = qrFormat.value === "jpg" || !lastRender.transparent;
        if (needsOpaque) {
          ctx.fillStyle = lastRender.bg;
          ctx.fillRect(0, 0, exportSize, exportSize);
        } else {
          ctx.clearRect(0, 0, exportSize, exportSize);
        }
        if (node.tagName === "CANVAS") {
          ctx.drawImage(node, padding, padding);
        } else {
          const img = node;
          ctx.drawImage(img, padding, padding);
        }
        return exportCanvas;
      };

      const exportSvg = (pngDataUrl, size) => {
        const bg = lastRender.transparent ? "none" : lastRender.bg;
        const svg =
          `<?xml version="1.0" encoding="UTF-8"?>\n` +
          `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">` +
          `<rect width="100%" height="100%" fill="${bg}" />` +
          `<image href="${pngDataUrl}" width="${size}" height="${size}" />` +
          `</svg>`;
        return new Blob([svg], { type: "image/svg+xml" });
      };

      const copyQrText = async () => {
        const raw = qrText.value.trim();
        if (!raw) return;
        const text = qrMode === "url" ? normalizeUrl(raw) : raw;
        try {
          if (navigator.clipboard && navigator.clipboard.writeText) {
            await navigator.clipboard.writeText(text);
          } else {
            const helper = document.createElement("textarea");
            helper.value = text;
            helper.setAttribute("readonly", "true");
            helper.style.position = "fixed";
            helper.style.opacity = "0";
            document.body.appendChild(helper);
            helper.select();
            document.execCommand("copy");
            document.body.removeChild(helper);
          }
          setStatus("copied to clipboard.");
        } catch (error) {
          setStatus("copy failed.");
        }
      };

      const downloadQr = () => {
        if (qrDownload.disabled) return;
        const exportCanvas = buildExportCanvas();
        if (!exportCanvas) return;
        const format = qrFormat.value;
        const link = document.createElement("a");
        if (format === "svg") {
          const pngData = exportCanvas.toDataURL("image/png");
          const blob = exportSvg(pngData, exportCanvas.width);
          const url = URL.createObjectURL(blob);
          link.download = "qr.svg";
          link.href = url;
          link.click();
          URL.revokeObjectURL(url);
          return;
        }
        const mime = format === "jpg" ? "image/jpeg" : "image/png";
        const dataUrl = exportCanvas.toDataURL(mime, 0.95);
        link.download = `qr.${format}`;
        link.href = dataUrl;
        link.click();
      };

      qrText.addEventListener("input", () => {
        updateCount();
        renderQr();
      });
      qrSize.addEventListener("change", renderQr);
      qrEcc.addEventListener("change", renderQr);
      qrMargin.addEventListener("change", renderQr);
      qrFg.addEventListener("input", renderQr);
      qrBg.addEventListener("input", renderQr);
      qrTransparent.addEventListener("change", () => {
        updateBackgroundState();
        renderQr();
      });
      qrFormat.addEventListener("change", updateDownloadLabel);
      qrCopy.addEventListener("click", copyQrText);
      qrDownload.addEventListener("click", downloadQr);
      qrClear.addEventListener("click", () => {
        qrText.value = "";
        updateCount();
        renderQr();
      });
      window.addEventListener("resize", () => {
        window.requestAnimationFrame(renderQr);
      });
      modeButtons.forEach((button) => {
        button.addEventListener("click", () => setMode(button.dataset.mode));
      });

      updateCount();
      updateBackgroundState();
      updateDownloadLabel();
      setMode(qrMode);
    </script>
    <script src="site.js"></script>
  </body>
</html>
