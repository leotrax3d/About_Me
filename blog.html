<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>blog — leotrax3d</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=menu"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="page-blog custom-cursor">
    <!-- Shared chrome (background field, cursor, terminal, nav) is
         injected by site.js. -->

    <div class="page-header">
      <div class="wrap">
        <div class="page-eyebrow" id="blog-eyebrow">
          leotrax3d &nbsp;·&nbsp; <span>blog</span>
        </div>
        <h1 id="blog-title">Blog</h1>
        <p class="page-sub" id="blog-sub">
          build logs, homelab notes &amp; the occasional half-baked idea — drop a
          markdown file in <code>/blog</code> and it shows up here.
        </p>
      </div>
    </div>

    <section id="blog">
      <div class="wrap">
        <div class="sec">
          <div id="blog-list"></div>
          <div id="blog-article" hidden></div>
        </div>
      </div>
    </section>

    <footer>
      <a href="index.html">← back to leotrax3d</a>
      <a href="https://github.com/leotrax3d" target="_blank"
        >github.com/leotrax3d</a
      >
    </footer>

    <script>
      // Page-specific terminal command; site.js provides the rest.
      window.terminalCommands = {
        posts(args, t) {
          t.print("opening posts...");
          if (window.__blogShowList) {
            t.close();
            window.__blogShowList();
          } else {
            window.location.href = "blog.html";
          }
        },
      };
    </script>
    <script>
      /* ================================================================
         BLOG — fetches markdown posts from the /blog folder and renders
         them in the site theme. No build step, no dependencies: posts are
         auto-discovered via the GitHub contents API (just drop a .md file
         in /blog and push), with an optional /blog/posts.json fallback for
         local preview or when the API is unavailable.

         Routing is query-param based (?post=<slug>) using the History API,
         so the list and individual posts share this single page.
      ================================================================ */
      (function () {
        "use strict";

        const REPO = "leotrax3d/About_Me";
        const API = `https://api.github.com/repos/${REPO}/contents/blog`;
        const DIR = "blog";
        const MONTHS = [
          "Jan", "Feb", "Mar", "Apr", "May", "Jun",
          "Jul", "Aug", "Sep", "Oct", "Nov", "Dec",
        ];

        const eyebrowEl = document.getElementById("blog-eyebrow");
        const titleEl = document.getElementById("blog-title");
        const subEl = document.getElementById("blog-sub");
        const listEl = document.getElementById("blog-list");
        const articleEl = document.getElementById("blog-article");

        let cache = null; // enriched + sorted post metadata, fetched once

        /* ---------- helpers ---------- */

        const escapeHtml = (s) =>
          String(s)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;");

        const escapeAttr = (s) => escapeHtml(s).replace(/"/g, "&quot;");

        const safeUrl = (url) => {
          const u = String(url).trim();
          return /^\s*javascript:/i.test(u) ? "#" : u;
        };

        const formatDate = (iso) => {
          if (!iso) return "";
          const m = String(iso).match(/(\d{4})-(\d{2})-(\d{2})/);
          if (!m) return String(iso);
          return `${parseInt(m[3], 10)} ${MONTHS[parseInt(m[2], 10) - 1]} ${m[1]}`;
        };

        const dateFromName = (name) => {
          const m = String(name).match(/(\d{4}-\d{2}-\d{2})/);
          return m ? m[1] : "";
        };

        const prettify = (slug) =>
          slug
            .replace(/^\d{4}-\d{2}-\d{2}[-_]?/, "")
            .replace(/[-_]+/g, " ")
            .trim() || slug;

        const firstHeading = (body) => {
          const m = body.match(/^#\s+(.+)$/m);
          return m ? m[1].trim() : "";
        };

        const plainText = (md) =>
          md
            .replace(/`{1,3}[^`]*`{1,3}/g, " ")
            .replace(/!\[[^\]]*\]\([^)]*\)/g, " ")
            .replace(/\[([^\]]+)\]\([^)]*\)/g, "$1")
            .replace(/[#>*_~`|]/g, " ")
            .replace(/\s+/g, " ")
            .trim();

        const firstParagraph = (body) => {
          const lines = body.split("\n");
          for (let i = 0; i < lines.length; i++) {
            const l = lines[i].trim();
            if (
              !l ||
              /^#/.test(l) ||
              /^[-*+]\s/.test(l) ||
              /^\d+[.)]\s/.test(l) ||
              /^>/.test(l) ||
              /^```/.test(l) ||
              /^\|/.test(l)
            )
              continue;
            const t = plainText(l);
            if (t) return t.length > 150 ? t.slice(0, 150).trim() + "…" : t;
          }
          return "";
        };

        const parseFrontmatter = (src) => {
          src = src.replace(/^﻿/, "");
          const m = src.match(/^---\n([\s\S]*?)\n---\n?/);
          const meta = {};
          let body = src;
          if (m) {
            body = src.slice(m[0].length);
            m[1].split("\n").forEach((line) => {
              const idx = line.indexOf(":");
              if (idx > -1) {
                const k = line.slice(0, idx).trim().toLowerCase();
                const v = line
                  .slice(idx + 1)
                  .trim()
                  .replace(/^["']|["']$/g, "");
                if (k) meta[k] = v;
              }
            });
          }
          return { meta, body };
        };

        /* ---------- markdown -> html ---------- */

        const applyEmphasis = (s) =>
          s
            .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
            .replace(/__([^_]+)__/g, "<strong>$1</strong>")
            .replace(/(^|[^*])\*([^*\s][^*]*?)\*/g, "$1<em>$2</em>")
            .replace(/(^|[^_\w])_([^_\s][^_]*?)_/g, "$1<em>$2</em>")
            .replace(/~~([^~]+)~~/g, "<del>$1</del>");

        // Inline markdown. Input is raw (un-escaped) text; links, images and
        // code spans are stashed as placeholders so the surrounding text can
        // be safely escaped without double-escaping URLs or touching code.
        const parseInline = (text) => {
          const tokens = [];
          const stash = (html) => {
            tokens.push(html);
            return `%%TK${tokens.length - 1}%%`;
          };

          let t = String(text);
          t = t.replace(/`([^`]+)`/g, (m, c) =>
            stash(`<code>${escapeHtml(c)}</code>`),
          );
          t = t.replace(
            /!\[([^\]]*)\]\(([^)\s]+)(?:\s+"([^"]*)")?\)/g,
            (m, alt, url, title) =>
              stash(
                `<img src="${escapeAttr(safeUrl(url))}" alt="${escapeAttr(alt)}"${
                  title ? ` title="${escapeAttr(title)}"` : ""
                } loading="lazy">`,
              ),
          );
          t = t.replace(
            /\[([^\]]+)\]\(([^)\s]+)(?:\s+"([^"]*)")?\)/g,
            (m, txt, url, title) => {
              const u = safeUrl(url);
              const ext = /^https?:\/\//i.test(u);
              return stash(
                `<a href="${escapeAttr(u)}"${
                  title ? ` title="${escapeAttr(title)}"` : ""
                }${
                  ext ? ' target="_blank" rel="noopener noreferrer"' : ""
                }>${applyEmphasis(escapeHtml(txt))}</a>`,
              );
            },
          );
          t = applyEmphasis(escapeHtml(t));
          t = t.replace(/%%TK(\d+)%%/g, (m, i) => tokens[+i]);
          return t;
        };

        const splitRow = (line) =>
          line
            .trim()
            .replace(/^\|/, "")
            .replace(/\|$/, "")
            .split("|")
            .map((c) => c.trim());

        const renderMarkdown = (src) => {
          src = src.replace(/\r\n?/g, "\n");

          // Pull fenced code blocks out first so nothing inside them is
          // treated as markdown; they come back via placeholders.
          const blocks = [];
          src = src.replace(
            /```[^\n]*\n([\s\S]*?)```/g,
            (m, code) => {
              const esc = escapeHtml(code.replace(/\n$/, ""));
              blocks.push(`<pre class="blog-pre"><code>${esc}</code></pre>`);
              return `\n%%BK${blocks.length - 1}%%\n`;
            },
          );

          const lines = src.split("\n");
          let html = "";
          let i = 0;
          let para = [];

          const flush = () => {
            if (para.length) {
              html += `<p>${parseInline(para.join(" "))}</p>\n`;
              para = [];
            }
          };

          while (i < lines.length) {
            const line = lines[i];

            const bm = line.match(/^%%BK(\d+)%%$/);
            if (bm) {
              flush();
              html += blocks[+bm[1]] + "\n";
              i++;
              continue;
            }

            if (/^\s*$/.test(line)) {
              flush();
              i++;
              continue;
            }

            const h = line.match(/^(#{1,6})\s+(.*)$/);
            if (h) {
              flush();
              const lv = h[1].length;
              html += `<h${lv}>${parseInline(h[2].trim())}</h${lv}>\n`;
              i++;
              continue;
            }

            if (/^\s*(-{3,}|\*{3,}|_{3,})\s*$/.test(line)) {
              flush();
              html += "<hr>\n";
              i++;
              continue;
            }

            // GFM table: header row followed by a |---|---| separator.
            if (
              line.includes("|") &&
              i + 1 < lines.length &&
              /^\s*\|?[\s:|-]+\|[\s:|-]*$/.test(lines[i + 1]) &&
              /-/.test(lines[i + 1])
            ) {
              flush();
              const header = splitRow(line);
              i += 2;
              const rows = [];
              while (
                i < lines.length &&
                lines[i].includes("|") &&
                lines[i].trim() !== ""
              ) {
                rows.push(splitRow(lines[i]));
                i++;
              }
              let table =
                "<table><thead><tr>" +
                header.map((c) => `<th>${parseInline(c)}</th>`).join("") +
                "</tr></thead>";
              if (rows.length) {
                table +=
                  "<tbody>" +
                  rows
                    .map(
                      (r) =>
                        "<tr>" +
                        r.map((c) => `<td>${parseInline(c)}</td>`).join("") +
                        "</tr>",
                    )
                    .join("") +
                  "</tbody>";
              }
              html += table + "</table>\n";
              continue;
            }

            if (/^\s*>\s?/.test(line)) {
              flush();
              const q = [];
              while (i < lines.length && /^\s*>\s?/.test(lines[i])) {
                q.push(lines[i].replace(/^\s*>\s?/, ""));
                i++;
              }
              html += `<blockquote>${parseInline(q.join(" "))}</blockquote>\n`;
              continue;
            }

            if (/^\s*[-*+]\s+/.test(line)) {
              flush();
              const items = [];
              while (i < lines.length && /^\s*[-*+]\s+/.test(lines[i])) {
                items.push(lines[i].replace(/^\s*[-*+]\s+/, ""));
                i++;
              }
              html +=
                "<ul>" +
                items.map((it) => `<li>${parseInline(it)}</li>`).join("") +
                "</ul>\n";
              continue;
            }

            if (/^\s*\d+[.)]\s+/.test(line)) {
              flush();
              const items = [];
              while (i < lines.length && /^\s*\d+[.)]\s+/.test(lines[i])) {
                items.push(lines[i].replace(/^\s*\d+[.)]\s+/, ""));
                i++;
              }
              html +=
                "<ol>" +
                items.map((it) => `<li>${parseInline(it)}</li>`).join("") +
                "</ol>\n";
              continue;
            }

            para.push(line.trim());
            i++;
          }
          flush();
          return html;
        };

        // Pull a leading "# Heading" off the body so it can be shown as the
        // page title instead of being duplicated inside the article.
        const splitTitle = (body, fmTitle) => {
          const lines = body.split("\n");
          let idx = 0;
          while (idx < lines.length && lines[idx].trim() === "") idx++;
          let title = fmTitle || "";
          if (lines[idx] && /^#\s+/.test(lines[idx])) {
            const h1 = lines[idx].replace(/^#\s+/, "").trim();
            if (!title) title = h1;
            lines.splice(idx, 1);
          }
          return { title, rest: lines.join("\n") };
        };

        /* ---------- data ---------- */

        const fetchText = async (url, opts) => {
          const res = await fetch(url, opts);
          if (!res.ok) throw new Error("HTTP " + res.status);
          return res.text();
        };

        // Discover the post files: GitHub API first (auto-discovery), then
        // an optional posts.json manifest as a fallback.
        const discover = async () => {
          try {
            const res = await fetch(API, {
              headers: { Accept: "application/vnd.github+json" },
            });
            if (res.ok) {
              const data = await res.json();
              if (Array.isArray(data)) {
                const files = data.filter(
                  (f) =>
                    f.type === "file" &&
                    /\.md$/i.test(f.name) &&
                    f.name.toLowerCase() !== "readme.md",
                );
                if (files.length)
                  return files.map((f) => ({
                    name: f.name,
                    raw: f.download_url,
                  }));
              }
            }
          } catch (e) {
            /* fall through to manifest */
          }
          try {
            const arr = JSON.parse(
              await fetchText(`${DIR}/posts.json`, { cache: "no-cache" }),
            );
            if (Array.isArray(arr) && arr.length)
              return arr.map((n) => ({ name: String(n), raw: null }));
          } catch (e) {
            /* no manifest either */
          }
          return null;
        };

        const loadPostText = async (post) => {
          try {
            return await fetchText(`${DIR}/${post.name}`, { cache: "no-cache" });
          } catch (e) {
            if (post.raw) return fetchText(post.raw);
            throw e;
          }
        };

        const getPosts = async () => {
          if (cache) return cache;
          const found = await discover();
          if (!found) return null;
          const enriched = await Promise.all(
            found.map(async (p) => {
              try {
                const raw = await loadPostText(p);
                const { meta, body } = parseFrontmatter(raw);
                const slug = p.name.replace(/\.md$/i, "");
                return {
                  name: p.name,
                  raw: p.raw,
                  slug,
                  title: meta.title || firstHeading(body) || prettify(slug),
                  date: meta.date || dateFromName(p.name) || "",
                  description:
                    meta.description ||
                    meta.excerpt ||
                    firstParagraph(body),
                  tag: meta.tag || meta.category || "",
                };
              } catch (e) {
                return null;
              }
            }),
          );
          cache = enriched
            .filter(Boolean)
            .sort(
              (a, b) =>
                (b.date || "").localeCompare(a.date || "") ||
                a.title.localeCompare(b.title),
            );
          return cache;
        };

        /* ---------- rendering ---------- */

        const bindHover = (scope) => {
          // The cursor element is injected by site.js, so look it up
          // lazily at hover time rather than caching it on load.
          scope.querySelectorAll("a, button").forEach((el) => {
            el.addEventListener("mouseenter", () =>
              document.querySelector(".cursor")?.classList.add("is-hover"),
            );
            el.addEventListener("mouseleave", () =>
              document.querySelector(".cursor")?.classList.remove("is-hover"),
            );
          });
        };

        const setHeader = (eyebrow, title, sub) => {
          eyebrowEl.innerHTML = eyebrow;
          titleEl.textContent = title;
          if (sub) {
            subEl.innerHTML = sub;
            subEl.hidden = false;
          } else {
            subEl.hidden = true;
          }
        };

        const renderList = async () => {
          articleEl.hidden = true;
          listEl.hidden = false;
          document.title = "blog — leotrax3d";
          setHeader(
            'leotrax3d &nbsp;·&nbsp; <span>blog</span>',
            "Blog",
            "build logs, homelab notes &amp; the occasional half-baked idea.",
          );
          listEl.innerHTML = `<div class="blog-state">loading posts…</div>`;

          const posts = await getPosts();
          if (posts === null) {
            listEl.innerHTML = `<div class="blog-state">couldn't load the posts right now — please try again in a bit.</div>`;
            return;
          }
          if (!posts.length) {
            listEl.innerHTML = `<div class="blog-state">no posts yet. check back soon.</div>`;
            return;
          }

          listEl.innerHTML =
            `<div class="blog-items">` +
            posts
              .map(
                (p, idx) => `
            <a class="blog-item" href="?post=${encodeURIComponent(
              p.slug,
            )}" data-slug="${escapeAttr(p.slug)}" style="--i:${idx}">
              <span class="blog-item-date">${
                escapeHtml(formatDate(p.date)) || "—"
              }</span>
              <span class="blog-item-main">
                <span class="blog-item-title">${escapeHtml(p.title)}</span>
                ${
                  p.description
                    ? `<span class="blog-item-desc">${escapeHtml(
                        p.description,
                      )}</span>`
                    : ""
                }
              </span>
              ${
                p.tag
                  ? `<span class="blog-item-tag">${escapeHtml(p.tag)}</span>`
                  : `<span class="blog-item-arrow">→</span>`
              }
            </a>`,
              )
              .join("") +
            `</div>`;

          bindHover(listEl);
          listEl.querySelectorAll(".blog-item").forEach((a) => {
            a.addEventListener("click", (e) => {
              if (e.metaKey || e.ctrlKey || e.shiftKey || e.button !== 0) return;
              e.preventDefault();
              const slug = a.getAttribute("data-slug");
              history.pushState(
                { slug },
                "",
                `?post=${encodeURIComponent(slug)}`,
              );
              renderPost(slug);
              window.scrollTo(0, 0);
            });
          });
        };

        const renderPost = async (slug) => {
          listEl.hidden = true;
          articleEl.hidden = false;
          articleEl.innerHTML = `<div class="blog-state">loading…</div>`;
          setHeader('leotrax3d &nbsp;·&nbsp; <span>blog</span>', "Blog", "");

          let raw = null;
          try {
            raw = await loadPostText({ name: slug + ".md", raw: null });
          } catch (e) {
            // The same-origin file may not exist (e.g. an API-only name);
            // fall back to the discovered entry's raw download URL.
            const posts = await getPosts();
            const found = posts && posts.find((p) => p.slug === slug);
            if (found) {
              try {
                raw = await loadPostText(found);
              } catch (_) {
                /* give up below */
              }
            }
          }

          if (raw == null) {
            articleEl.innerHTML =
              `<a class="blog-back" href="blog.html">← all posts</a>` +
              `<div class="blog-state">post not found.</div>`;
            bindBack();
            return;
          }

          const { meta, body } = parseFrontmatter(raw);
          const { title, rest } = splitTitle(body, meta.title);
          const finalTitle = title || prettify(slug);
          const date = meta.date || dateFromName(slug + ".md") || "";

          setHeader(
            `leotrax3d &nbsp;·&nbsp; <span>${
              escapeHtml(formatDate(date)) || "blog"
            }</span>`,
            finalTitle,
            meta.description ? escapeHtml(meta.description) : "",
          );
          document.title = finalTitle + " — leotrax3d";

          articleEl.innerHTML =
            `<a class="blog-back" href="blog.html">← all posts</a>` +
            `<article class="blog-content">${renderMarkdown(rest)}</article>`;
          bindBack();
          bindHover(articleEl);
        };

        const bindBack = () => {
          const back = articleEl.querySelector(".blog-back");
          if (!back) return;
          back.addEventListener("click", (e) => {
            if (e.metaKey || e.ctrlKey || e.shiftKey || e.button !== 0) return;
            e.preventDefault();
            history.pushState({}, "", "blog.html");
            renderList();
            window.scrollTo(0, 0);
          });
        };

        /* ---------- routing ---------- */

        const route = () => {
          const slug = new URLSearchParams(location.search).get("post");
          if (slug) renderPost(slug);
          else renderList();
        };

        // Let the terminal "posts" command jump back to the list in-page.
        window.__blogShowList = () => {
          history.pushState({}, "", "blog.html");
          renderList();
          window.scrollTo(0, 0);
        };

        window.addEventListener("popstate", route);
        route();
      })();
    </script>
    <script src="site.js"></script>
  </body>
</html>
